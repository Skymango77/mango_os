<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mango OS | TOP SUPER ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        .gold-emboss {
            background: linear-gradient(145deg, #ffd700, #b8860b);
            
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
            font-weight: 900;
        }
        .ceo-card {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.1);
        }
        .pi-button {
            background: linear-gradient(to right, #eaab0c, #b8860b);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pi-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(234, 171, 12, 0.4);
        }
    </style>
</head>
<body class="bg-black text-white h-screen flex flex-col items-center justify-center font-sans overflow-hidden">

    <div class="absolute top-[-20%] left-[-10%] w-96 h-96 bg-yellow-500/5 rounded-full blur-[150px]"></div>

    <div class="ceo-card w-full max-w-[400px] rounded-[50px] p-12 text-center relative z-10">
        <div class="mb-10">
            <h1 class="text-3xl gold-emboss tracking-[0.2em] mb-2">MANGO OS</h1>
            <p class="text-white/40 text-[10px] uppercase tracking-widest">Top Super Admin Access</p>
        </div>

        <div class="w-24 h-24 bg-gradient-to-tr from-yellow-600 to-yellow-300 rounded-[35%] mx-auto mb-10 shadow-2xl flex items-center justify-center text-4xl">
            👑
        </div>

        <div id="login-section">
            <p class="text-sm text-white/60 mb-8 leading-relaxed">
                이 구역은 <span class="text-yellow-500 font-bold">Pi Network KYC</span> 인증을<br>완료한 마스터 권한자만 입장 가능합니다.
            </p>

            <button onclick="handlePiLogin()" class="pi-button w-full py-5 rounded-2xl text-black font-black text-lg shadow-lg active:scale-95">
                LOG IN WITH PI
            </button>
        </div>

        <div id="status-section" class="hidden">
            <div class="animate-pulse text-yellow-500 font-bold tracking-widest">
                VERIFYING KYC STATUS...
            </div>
        </div>
    </div>

    <button onclick="location.href='index.html'" class="mt-12 text-white/20 text-[10px] tracking-[0.5em] hover:text-white transition-all">EXIT ACCESS</button>

    <script>
        // Pi SDK 초기화 (대표님의 API 환경에 맞춰 설정됨)
        const Pi = window.Pi;
        Pi.init({ version: "1.5", sandbox: false });

        async function handlePiLogin() {
            const loginSection = document.getElementById('login-section');
            const statusSection = document.getElementById('status-section');

            try {
                loginSection.classList.add('hidden');
                statusSection.classList.remove('hidden');

                // 1. Pi 인증 요청
                const scopes = ['username', 'payments'];
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);

                // 2. KYC 통과 여부 및 유저 데이터 확인
                if (auth.user) {
                    console.log(`Welcome, ${auth.user.username}`);
                    showMangoToast(`${auth.user.username} CEO 인증 성공`);
                    
                    // 인증 성공 시 메인 대시보드로 이동
                    setTimeout(() => {
                        location.href = 'index.html'; 
                    }, 1500);
                }
            } catch (err) {
                console.error(err);
                showMangoToast("KYC 인증 정보가 없거나 취소되었습니다.");
                loginSection.classList.remove('hidden');
                statusSection.classList.add('hidden');
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("미결제 내역 발견:", payment);
        };

        function showMangoToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = "position:fixed; bottom:50px; left:50%; transform:translateX(-50%); background:#EAB308; color:black; padding:15px 30px; border-radius:50px; font-weight:900; z-index:1000; box-shadow: 0 0 30px rgba(234,179,8,0.5); font-size:14px;";
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
    </script>
</body>
</html>
