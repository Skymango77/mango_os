<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mango Profile | Core Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,900;1,900&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --mango-gold: #f59e0b; --dark-chrome: #0f172a; }
        body { background-color: var(--dark-chrome); font-family: 'Outfit', sans-serif; color: white; overflow-x: hidden; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        .metallic-card { background: linear-gradient(145deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9)); backdrop-filter: blur(20px); border: 1px solid rgba(245, 158, 11, 0.3); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); }
        .portal-stat-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .portal-stat-card:hover { border-color: var(--mango-gold); transform: translateY(-2px); }
        .gold-glow { text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="pb-10 custom-scroll">
    <div class="max-w-[480px] mx-auto min-h-screen relative flex flex-col">
        <header class="flex justify-between items-center p-6 sticky top-0 z-50 bg-[#0f172a]/80 backdrop-blur-md">
            <a href="../index.html" class="p-2 rounded-full hover:bg-white/5 transition-all active:scale-90"><i data-lucide="chevron-left" class="w-6 h-6 text-gray-400"></i></a>
            <h1 class="font-montserrat text-xl font-black italic tracking-tighter gold-glow uppercase">Mango <span class="text-amber-500">Profile</span></h1>
            <button onclick="openSettings()" class="p-2 rounded-full hover:bg-white/5 transition-all active:scale-90"><i data-lucide="settings" class="w-6 h-6 text-gray-400"></i></button>
        </header>

        <section class="relative w-full h-[220px] rounded-[2.5rem] overflow-hidden shadow-2xl mb-8 mt-4 border border-white/10 mx-auto w-[92%]">
            <div id="profile-bg-container" class="absolute inset-0 bg-gradient-to-br from-gray-900 to-black">
                <img id="profile-bg-img" src="" class="w-full h-full object-cover opacity-50 hidden" />
                <video id="profile-bg-video" class="w-full h-full object-cover opacity-50 hidden" autoplay loop muted playsinline></video>
            </div>
            <label class="absolute top-4 right-4 bg-black/40 p-2.5 rounded-full cursor-pointer backdrop-blur-md border border-white/20 hover:bg-white/20 transition-all z-20">
                <i data-lucide="camera" class="w-5 h-5 text-white drop-shadow-md"></i>
                <input type="file" id="bg-upload" accept="image/*,video/mp4" class="hidden" onchange="handleMediaUpload(event, 'bg')">
            </label>
            <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black via-black/70 to-transparent flex items-end gap-4 z-10">
                <div class="relative shrink-0">
                    <div class="w-16 h-16 rounded-full border-[3px] border-amber-500 overflow-hidden shadow-lg bg-black flex items-center justify-center relative">
                        <img id="profile-avatar-img" src="" class="w-full h-full object-cover absolute inset-0 hidden z-10" />
                        <span id="profile-avatar-text" class="text-3xl font-black text-amber-500 z-0">M</span>
                    </div>
                    <label class="absolute bottom-0 right-0 bg-amber-600 p-1.5 rounded-full cursor-pointer border border-amber-300 hover:bg-amber-500 transition-all z-20 translate-x-1 translate-y-1">
                        <i data-lucide="camera" class="w-3 h-3 text-white"></i>
                        <input type="file" id="avatar-upload" accept="image/*" class="hidden" onchange="handleMediaUpload(event, 'avatar')">
                    </label>
                </div>
                <div class="flex-1 pb-1">
                    <h2 class="text-xl font-bold text-white flex items-center gap-2 drop-shadow-md"><span id="display-name">Loading...</span> <i data-lucide="badge-check" class="w-4 h-4 text-blue-400"></i></h2>
                    <p id="display-id" class="text-[10px] text-amber-500/90 font-mono tracking-widest mt-0.5 uppercase">ID: CONNECTING...</p>
                    <div class="flex gap-2 mt-1.5">
                        <span class="px-2 py-0.5 rounded-full bg-green-500/20 border border-green-500/30 text-[9px] text-green-400 font-bold">KYC Verified</span>
                        <span class="px-2 py-0.5 rounded-full bg-purple-500/20 border border-purple-500/30 text-[9px] text-purple-400 font-bold">Pi Wallet</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="px-6 mt-6 space-y-4">
            <h3 class="text-[10px] font-black text-yellow-500 uppercase tracking-[0.3em] ml-2">Portal Nexus Status</h3>
            <div class="grid grid-cols-4 gap-3">
                <a href="../Food/index.html" class="portal-stat-card rounded-2xl p-3 flex flex-col items-center justify-center border border-white/10 bg-black/40 transition-all group-active:scale-95">
                    <i data-lucide="utensils" class="w-5 h-5 text-orange-500 mb-1 drop-shadow-[0_0_8px_rgba(249,115,22,0.6)]"></i>
                    <span class="text-[8px] text-orange-400 font-bold uppercase">Food</span>
                    <span class="text-[9px] text-white font-black">맛집</span>
                </a>
                <a href="../Transfer/index.html" class="portal-stat-card rounded-2xl p-3 flex flex-col items-center justify-center border border-white/10 bg-black/40 transition-all group-active:scale-95">
                    <i data-lucide="car" class="w-5 h-5 text-blue-400 mb-1 drop-shadow-[0_0_8px_rgba(96,165,250,0.6)]"></i>
                    <span class="text-[8px] text-blue-300 font-bold uppercase">Taxi</span>
                    <span class="text-[9px] text-white font-black">교통</span>
                </a>
                <a href="../Travel/index.html" class="portal-stat-card rounded-2xl p-3 flex flex-col items-center justify-center border border-white/10 bg-black/40 transition-all group-active:scale-95">
                    <i data-lucide="plane" class="w-5 h-5 text-purple-400 mb-1 drop-shadow-[0_0_8px_rgba(192,132,252,0.6)]"></i>
                    <span class="text-[8px] text-purple-300 font-bold uppercase">Travel</span>
                    <span class="text-[9px] text-white font-black">여행</span>
                </a>
                <a href="../Hobby/index.html" class="portal-stat-card rounded-2xl p-3 flex flex-col items-center justify-center border border-white/10 bg-black/40 transition-all group-active:scale-95">
                    <i data-lucide="heart" class="w-5 h-5 text-pink-400 mb-1 drop-shadow-[0_0_8px_rgba(244,114,182,0.6)]"></i>
                    <span class="text-[8px] text-pink-300 font-bold uppercase">Hobby</span>
                    <span class="text-[9px] text-white font-black">취미</span>
                </a>
                <a href="../Realty/index.html" class="portal-stat-card rounded-2xl p-3 flex flex-col items-center justify-center border border-white/10 bg-black/40 transition-all group-active:scale-95">
                    <i data-lucide="home" class="w-5 h-5 text-yellow-500 mb-1 drop-shadow-[0_0_8px_rgba(234,179,8,0.6)]"></i>
                    <span class="text-[8px] text-yellow-400 font-bold uppercase">Realty</span>
                    <span class="text-[9px] text-white font-black">부동산</span>
                </a>
                <a href="../Market/index.html" class="portal-stat-card rounded-2xl p-3 flex flex-col items-center justify-center border border-white/10 bg-black/40 transition-all group-active:scale-95">
                    <i data-lucide="shopping-cart" class="w-5 h-5 text-green-400 mb-1 drop-shadow-[0_0_8px_rgba(74,222,128,0.6)]"></i>
                    <span class="text-[8px] text-green-300 font-bold uppercase">Market</span>
                    <span class="text-[9px] text-white font-black">마켓</span>
                </a>
                <!-- FIXED: Updated path to mango_chat.html -->
                <a href="mango_chat.html" class="portal-stat-card rounded-2xl p-3 flex flex-col items-center justify-center border border-white/10 bg-black/40 transition-all group-active:scale-95">
                    <i data-lucide="message-circle" class="w-5 h-5 text-cyan-400 mb-1 drop-shadow-[0_0_8px_rgba(34,211,238,0.6)]"></i>
                    <span class="text-[8px] text-cyan-300 font-bold uppercase">Chat</span>
                    <span class="text-[9px] text-white font-black italic">채팅</span>
                </a>
                <a href="../Education/index.html" class="portal-stat-card rounded-2xl p-3 flex flex-col items-center justify-center border border-white/10 bg-black/40 transition-all group-active:scale-95">
                    <i data-lucide="graduation-cap" class="w-5 h-5 text-indigo-400 mb-1 drop-shadow-[0_0_8px_rgba(129,140,248,0.6)]"></i>
                    <span class="text-[8px] text-indigo-300 font-bold uppercase">Edu</span>
                    <span class="text-[9px] text-white font-black">교육</span>
                </a>
            </div>
        </section>

        <section class="px-6 mt-10 space-y-6">
            <div class="flex justify-between items-center px-2"><h3 class="text-xs font-black text-yellow-500 uppercase tracking-[0.3em]">Mango Friends Network</h3><div class="flex items-center gap-1.5 bg-amber-500/10 px-3 py-1.5 rounded-full border border-amber-500/20"><i data-lucide="zap" class="w-3.5 h-3.5 text-amber-500 animate-pulse"></i><span class="text-[10px] font-black text-amber-500 italic">+0.25 MNG/hr</span></div></div> 
            <div class="metallic-card rounded-[2.5rem] p-8 text-center space-y-4 relative overflow-hidden">
                <div class="absolute -left-10 -bottom-10 w-32 h-32 bg-amber-500/5 rounded-full blur-3xl"></div> 
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.2em]">Personal Invitation Code</p>
                <div onclick="copyToClipboard('MANGO-2026')" class="bg-black/40 py-4 rounded-3xl border border-dashed border-amber-500/40 font-montserrat text-2xl font-black text-amber-500 tracking-tighter gold-glow cursor-pointer active:scale-95 transition-transform">MANGO-2026</div>
                <button onclick="shareReferral()" class="w-full py-5 bg-gradient-to-r from-amber-400 to-yellow-600 text-black font-black rounded-2xl shadow-xl active:scale-95 transition-all text-xs tracking-widest flex items-center justify-center gap-2 uppercase italic"><i data-lucide="user-plus" class="w-4 h-4"></i> Invite Friends & Earn</button>
            </div> 
            <div class="space-y-4"> 
                <div class="flex justify-between items-center px-2"><span class="text-[10px] text-gray-500 font-black uppercase tracking-widest">My Network (<span id="active-members-count">0</span> Active)</span><span class="text-[9px] text-green-500 font-bold bg-green-500/10 px-2 py-1 rounded-md border border-green-500/20"><span id="total-members-count">0</span> Total Members</span></div> 
                <div id="my-network-list" class="space-y-3"></div> 
            </div>
        </section>
    </div>
    <div id="copy-toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 bg-amber-500 text-black font-black text-[10px] rounded-full shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[100] italic">INFO!</div> 
<script>
        lucide.createIcons();
        document.addEventListener('DOMContentLoaded', () => {
            const nameEl = document.getElementById('display-name');
            const idEl = document.getElementById('display-id');
            nameEl.innerText = localStorage.getItem('mango_user_name') || 'New Mango Member';
            let mId = localStorage.getItem('mango_user_id');
            if(!mId) { mId = 'MNG-' + Math.random().toString(36).substr(2, 5).toUpperCase(); localStorage.setItem('mango_user_id', mId); }
            idEl.innerText = 'ID: ' + mId;
            
            // Load Persisted Images
            const savedAvatar = localStorage.getItem('mango_avatar_image');
            if(savedAvatar) {
                const img = document.getElementById('profile-avatar-img');
                document.getElementById('profile-avatar-text').classList.add('hidden');
                img.src = savedAvatar; img.classList.remove('hidden');
            }
            const savedBg = localStorage.getItem('mango_bg_image');
            const savedBgType = localStorage.getItem('mango_bg_type');
            if(savedBg) applyBg(savedBg, savedBgType);

            renderNetwork();
        });

        function showToast(m) { const t = document.getElementById('copy-toast'); t.innerText = m; t.classList.replace('opacity-0', 'opacity-100'); t.classList.replace('translate-y-10', 'translate-y-0'); setTimeout(() => { t.classList.replace('opacity-100', 'opacity-0'); t.classList.replace('translate-y-0', 'translate-y-10'); }, 3000); }
        function copyToClipboard(text) { navigator.clipboard.writeText(text).then(() => showToast('✨ Code Copied to Clipboard!')); }
        function shareReferral() {
            const m = "Join Mango with me! Code: MANGO-2026. Future is here! https://mango-os-6xu2.vercel.app";
            if(navigator.share) { navigator.share({ title: 'Mango Invite', text: m, url: 'https://mango-os-6xu2.vercel.app' }).then(() => showToast('🚀 Invitation Sent!')); } 
            else { copyToClipboard(m); }
        }

        function handleMediaUpload(event, target) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const fileURL = e.target.result;
                if (target === 'avatar') {
                    localStorage.setItem('mango_avatar_image', fileURL);
                    const img = document.getElementById('profile-avatar-img'); document.getElementById('profile-avatar-text').classList.add('hidden');
                    img.src = fileURL; img.classList.remove('hidden');
                }
                else if (target === 'bg') {
                    localStorage.setItem('mango_bg_image', fileURL);
                    localStorage.setItem('mango_bg_type', file.type);
                    applyBg(fileURL, file.type);
                }
            }
            reader.readAsDataURL(file);
        }

        function applyBg(url, type) {
            const bgImg = document.getElementById('profile-bg-img'); const bgVid = document.getElementById('profile-bg-video');
            if (type && type.startsWith('video/')) {
                bgImg.classList.add('hidden'); bgVid.src = url; bgVid.classList.remove('hidden'); bgVid.play();
            } else {
                bgVid.classList.add('hidden'); bgVid.pause(); bgImg.src = url; bgImg.classList.remove('hidden');
            }
        }

        const mangoNetworkMembers = [
            { id: 'sarah_p', name: 'Sarah P.', status: 'active', contribution: '+0.05 MNG/hr', avatarSeed: 'Sarah' },
            { id: 'kevin_l', name: 'Kevin L.', status: 'inactive', contribution: '0 MNG/hr', avatarSeed: 'Kevin' },
            { id: 'john_d', name: 'John D.', status: 'active', contribution: '+0.03 MNG/hr', avatarSeed: 'John' }
        ];

        function renderNetwork() {
            const list = document.getElementById('my-network-list'); if (!list) return;
            list.innerHTML = ''; let active = 0;
            mangoNetworkMembers.forEach(m => {
                const isActive = m.status === 'active'; if (isActive) active++;
                const pEx = localStorage.getItem(`ping_${m.id}`); const isPinged = pEx && Date.now() < parseInt(pEx);
                const html = `<div class="flex items-center justify-between bg-white/[0.03] p-4 rounded-3xl border border-white/5 hover:border-amber-500/20 transition-all">
                    <div class="flex items-center gap-3">
                        <div class="relative"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${m.avatarSeed}" class="w-10 h-10 rounded-full bg-slate-800 ${isActive?'':'grayscale'}"><span class="absolute bottom-0 right-0 w-2.5 h-2.5 ${isActive?'bg-green-500':'bg-red-500'} rounded-full border-2 border-[#0f172a]"></span></div>
                        <div><p class="text-xs font-bold text-white">${m.name}</p><p class="text-[8px] ${isActive?'text-gray-500':'text-red-500/70'} uppercase italic tracking-tighter">${isActive?'Mining: '+m.contribution:'Inactive'}</p></div>
                    </div>
                    ${!isActive ? `<button onclick="pingUser('${m.id}')" ${isPinged?'disabled':''} class="px-3 py-1 bg-amber-500/10 text-amber-500 text-[8px] font-bold rounded-full border border-amber-500/20 ${isPinged?'opacity-50 cursor-not-allowed':''}">${isPinged?'Ping Sent':'Ping'}</button>` : ''}
                </div>`;
                list.insertAdjacentHTML('beforeend', html);
            });
            document.getElementById('active-members-count').innerText = active;
            document.getElementById('total-members-count').innerText = mangoNetworkMembers.length;
        }
        function pingUser(id) { const expiry = Date.now() + (24*60*60*1000); localStorage.setItem(`ping_${id}`, expiry); showToast('🚀 Wake-up ping sent via Pi Browser!'); renderNetwork(); }
        function openSettings() { showToast('Settings center connecting...'); }
    </script>
</body>
</html>
