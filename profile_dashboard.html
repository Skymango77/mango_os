<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mango Pi Ecosystem - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mango-gradient { background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%); }
    </style>
</head>
<body class="bg-[#0f172a] text-white min-h-screen font-sans">

<div id="mango-app" class="max-w-md mx-auto p-6 space-y-6">
    <header class="text-center py-8">
        <div class="relative inline-block">
            <img id="user-avatar" src="assets/img/mango.jpg" class="w-24 h-24 rounded-full border-4 border-yellow-500 shadow-2xl mx-auto">
            <span class="absolute bottom-0 right-0 bg-green-500 w-6 h-6 rounded-full border-2 border-[#0f172a]"></span>
        </div>
        <h1 class="text-2xl font-black mt-4"><span id="user-name-display">Loading...</span></h1>
        <p class="text-gray-400 text-sm">Mango Ecosystem Verified</p>
    </header>

    <div class="glass p-6 rounded-[2rem] space-y-4">
        <div class="flex justify-between items-center">
            <h2 class="font-bold text-lg">Pi Ecosystem Status</h2>
            <span class="text-[10px] bg-yellow-500/20 text-yellow-500 px-2 py-1 rounded-full font-bold">ACTIVE</span>
        </div>
        
        <div id="status-guide" class="text-sm text-gray-300 leading-relaxed">
            파이 생태계에 오신 것을 환영합니다! 테스트 결제를 통해 망고 생태계의 기능을 미리 체험해보세요.
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="window.open('https://minepi.com/')" class="bg-white/10 hover:bg-white/20 p-3 rounded-xl text-xs transition-all">
                ⛏️ 파이 가입하기
            </button>
            <button onclick="alert('준비 중인 기능입니다.')" class="bg-white/10 hover:bg-white/20 p-3 rounded-xl text-xs transition-all">
                🔗 공유하기
            </button>
        </div>
    </div>

    <div class="mango-gradient p-6 rounded-[2rem] shadow-[0_20px_50px_rgba(234,179,8,0.3)]">
        <div class="text-center space-y-2">
            <p class="text-xs font-bold text-yellow-100 uppercase tracking-widest">Test Payment</p>
            <p class="text-4xl font-black">0.01 <span class="text-2xl">π</span></p>
            <p class="text-[10px] text-yellow-100 opacity-70 italic">Testnet 전용 (실제 파이가 소모되지 않습니다)</p>
        </div>
        
        <button id="pay-button" onclick="payWithPi()" class="w-full mt-6 bg-black text-white py-4 rounded-2xl font-black text-lg hover:scale-105 transition-all shadow-xl">
            PAY WITH TEST-PI
        </button>
    </div>

    <footer class="text-center text-[10px] text-gray-500 uppercase tracking-tighter">
        © 2026 Mango Glass Platform | Powered by Pi Network
    </footer>
</div>

<script>
    const Pi = window.Pi;
    let currentUser = null;

    // 1. 시스템 초기화 및 인증
    async function initMangoSystem() {
        try {
            // sandbox: true는 Testnet 결제를 의미합니다.
            await Pi.init({ version: "2.0", sandbox: true });
            console.log("Pi SDK Initialized (Sandbox)");

            const scopes = ['username', 'payments'];
            const auth = await Pi.authenticate(scopes, (payment) => {
                console.log("Incomplete payment found:", payment);
            });

            currentUser = auth.user.username;
            document.getElementById('user-name-display').innerText = currentUser;
            console.log("User Authenticated:", currentUser);

        } catch (err) {
            console.error("Initialization failed:", err);
            document.getElementById('user-name-display').innerText = "Guest User";
        }
    }

    // 2. 테스트 결제 로직
    async function payWithPi() {
        if (!currentUser) {
            alert("Pi 브라우저에서 인증이 필요합니다.");
            return;
        }

        try {
            const payment = await Pi.createPayment({
                amount: 0.01,
                memo: "Mango Ecosystem Test Payment",
                metadata: { test_user: currentUser, type: "test_check" }
            }, {
                onReadyForServerApproval: async (paymentId) => {
                    console.log("Step 1: 서버 승인 요청 시작", paymentId);
                    try {
                        const response = await fetch('https://mango-os-6xu2.vercel.app/api/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId })
                        });
                        const result = await response.json();
                        console.log("Step 1 완료:", result);
                    } catch (err) {
                        console.error("Step 1 에러:", err);
                    }
                },
                onReadyForServerCompletion: async (paymentId, txid) => {
                    console.log("Step 2: 결제 완료 처리 시작", txid);
                    try {
                        const response = await fetch('https://mango-os-6xu2.vercel.app/api/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid })
                        });
                        const result = await response.json();
                        if (response.ok) {
                            alert("✅ 테스트 결제가 최종 완료되었습니다!");
                            location.reload();
                        }
                    } catch (err) {
                        console.error("Step 2 에러:", err);
                    }
                },
                onCancel: (paymentId) => { console.log("Cancelled:", paymentId); },
                onError: (error, payment) => { 
                    alert("결제 에러: " + error.message);
                    console.error(error);
                }
            });
        } catch (err) {
            alert("결제 요청 실패: " + err.message);
        }
    }

    // 페이지 로드 시 즉시 초기화
    window.addEventListener('load', initMangoSystem);
</script>
</body>
</html>
