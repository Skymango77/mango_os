<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mango AI - Hobby Intelligence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        .font-orbit { font-family: 'Orbitron', sans-serif; }
        .cyber-grid {
            background-image: linear-gradient(rgba(249, 115, 22, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(249, 115, 22, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#050505] text-white min-h-screen font-sans overflow-x-hidden cyber-grid">

    <!-- 상단 헤더: AI 가동 상태 -->
    <header class="p-6 pt-10 flex justify-between items-center relative z-10">
        <div class="flex items-center gap-3">
            <div class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-orange-500"></span>
            </div>
            <div>
                <p class="text-orange-500 font-orbit text-[10px] tracking-[0.4em] uppercase mb-0.5">AI Curation Mode</p>
                <h1 class="text-2xl font-black italic tracking-tighter">INTELLIGENCE <span class="text-orange-500">EXPLORE</span></h1>
            </div>
        </div>
        <button onclick="history.back()" class="w-12 h-12 rounded-2xl border border-white/10 flex items-center justify-center bg-white/5 active:scale-90 transition-all">
            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round"></path></svg>
        </button>
    </header>

    <main class="px-6 pb-24 relative z-10 space-y-6">
        
        <!-- AI 데이터 분석 비주얼 (통계 대시보드) -->
        <section class="glass-panel p-8 rounded-[2.5rem] border-orange-500/20 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-6 opacity-10">
                <svg class="w-32 h-32 text-orange-500" fill="currentColor" viewBox="0 0 24 24"><path d="M13 2L3 14h9v8l10-12h-9V2z"></path></svg>
            </div>
            
            <div class="flex flex-col items-center text-center">
                <div class="relative mb-6">
                    <!-- 92% 매칭 서클 -->
                    <svg class="w-32 h-32 transform -rotate-90">
                        <circle cx="64" cy="64" r="58" stroke="currentColor" stroke-width="8" fill="transparent" class="text-white/5" />
                        <circle cx="64" cy="64" r="58" stroke="currentColor" stroke-width="8" fill="transparent" 
                                stroke-dasharray="364.4" stroke-dashoffset="29.1"
                                class="text-orange-500 drop-shadow-[0_0_8px_rgba(249,115,22,0.6)]" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span class="text-4xl font-black font-orbit italic">92<span class="text-lg ml-0.5">%</span></span>
                        <span class="text-[8px] text-orange-400 font-bold uppercase tracking-widest mt-1">Match Rate</span>
                    </div>
                </div>
                
                <div class="space-y-1">
                    <h3 class="text-lg font-bold">사용자 성향 분석 완료</h3>
                    <p class="text-xs text-white/40 leading-relaxed max-w-[240px] mx-auto">
                        수석 디자이너님의 최근 디자인 활동과 관심 키워드를 기반으로 3,429개의 취미 중 가장 완벽한 활동을 선별했습니다.
                    </p>
                </div>
            </div>

            <div class="mt-8 grid grid-cols-2 gap-4">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[9px] text-gray-500 font-black uppercase mb-1">Deep Learning</p>
                    <p class="text-sm font-bold text-orange-300 italic font-orbit">SYNCED</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[9px] text-gray-500 font-black uppercase mb-1">Data Source</p>
                    <p class="text-sm font-bold text-cyan-400 italic font-orbit">MANGO_CORE</p>
                </div>
            </div>
        </section>

        <!-- AI 추천 결과 리스트 -->
        <section class="space-y-4">
            <h3 class="text-[10px] font-orbit text-white/30 tracking-[0.4em] uppercase px-1">Top AI Recommendations</h3>
            
            <div class="space-y-3">
                <div class="glass-panel p-5 rounded-3xl flex items-center justify-between group active:scale-[0.98] transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-orange-500/10 flex items-center justify-center text-2xl border border-orange-500/20 group-hover:bg-orange-500/20 transition-colors">🎨</div>
                        <div>
                            <h4 class="text-md font-black italic tracking-tight">3D 메탈릭 금화 디자인</h4>
                            <p class="text-[10px] text-white/40 mt-0.5">#CreativeArt #Graphic #Premium</p>
                        </div>
                    </div>
                    <i class="text-orange-500/40 group-hover:text-orange-500 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </i>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
