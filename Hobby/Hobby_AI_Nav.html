<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mango AI Navigation Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbit&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0a0a0a] text-white h-[100dvh] w-screen flex flex-col items-center justify-center relative overflow-hidden font-sans">
    
    <!-- 배경 은은한 오렌지/골드 라이팅 효과 -->
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-orange-900/30 via-black to-black z-0 pointer-events-none"></div>

    <!-- 상단 AI 비주얼 -->
    <div class="z-10 text-center mb-10 w-full px-6">
        <div class="w-16 h-16 mx-auto rounded-full border-4 border-yellow-500 p-[2px] shadow-[0_0_35px_rgba(249,115,22,0.6)] mb-6 animate-pulse">
            <img src="../assets/img/mango_metal.png" alt="Mango AI" class="w-17 h-17 rounded-full border-2 border-orange-500 shadow-lg group-hover:rotate-12 transition-transform">
        </div>
        <h1 class="text-3xl font-black italic bg-clip-text text-transparent bg-gradient-to-r from-yellow-300 via-orange-500 to-yellow-700 tracking-wider">MANGO A.I. HUB</h1>
        <p class="text-orange-500/80 text-[10px] mt-2 font-orbit tracking-[0.3em] uppercase">Navigation System Active</p>
    </div>

    <!-- 네비게이션 메뉴 리스트 (글래스모피즘 카드) -->
    <div class="z-10 w-full max-w-xs flex flex-col gap-3">
        <a href="../index.html" class="flex items-center p-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-orange-500/20 hover:border-orange-500/50 transition-all backdrop-blur-md group">
            <span class="text-2xl mr-4 group-hover:scale-110 transition-transform">🏠</span>
            <span class="text-lg font-bold tracking-wide">망고 메인 포털</span>
        </a>
        <!-- [초고도화 AI 버튼: 딥러닝 취미 큐레이션] -->
<a href="Hobby_Explore.html" class="relative overflow-hidden flex items-center p-4 bg-gradient-to-r from-orange-900/40 to-black border border-orange-500/40 rounded-2xl hover:border-orange-400 hover:shadow-[0_0_20px_rgba(249,115,22,0.5)] transition-all duration-300 group z-10">
    
    <!-- 좌측 AI 센서 아이콘 영역 -->
    <div class="relative w-12 h-12 flex-shrink-0 flex items-center justify-center bg-orange-500/10 rounded-xl border border-orange-500/30 mr-4 shadow-[0_0_10px_rgba(249,115,22,0.2)] group-hover:bg-orange-500/30 transition-colors">
        <!-- 레이더/탐색 SVG -->
        <svg class="w-6 h-6 text-orange-400 group-hover:text-yellow-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 10l.01 0"></path>
        </svg>
        <!-- AI 연산 상태 표시등 (핑 애니메이션) -->
        <span class="absolute -top-1 -right-1 flex h-3 w-3">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-3 w-3 bg-yellow-500 border border-black"></span>
        </span>
    </div>

    <!-- 중앙 정보 텍스트 영역 -->
    <div class="flex flex-col z-10 flex-grow">
        <!-- 상단 사이버네틱 라벨 -->
        <span class="text-[9px] font-orbit text-orange-400 tracking-[0.2em] uppercase mb-0.5 font-bold">Deep Learning Curation</span>
        
        <!-- 메인 타이틀 -->
        <span class="text-lg font-black text-white group-hover:text-orange-300 transition-colors tracking-wide">AI 맞춤 취미 탐색</span>
        
        <!-- 하단 상태 표시줄 -->
        <span class="text-[10px] text-white/50 mt-1 flex items-center gap-1.5 font-light">
            <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse shadow-[0_0_5px_rgba(34,211,238,0.8)]"></span>
            유저 성향 데이터 동기화 중...
        </span>
    </div>
    
    <!-- 우측 진입 화살표 -->
    <div class="ml-2 text-orange-500/50 group-hover:text-orange-400 group-hover:translate-x-1 transition-all">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
    </div>
</a>
        <a href="../Chat/index.html" class="flex items-center p-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-orange-500/20 hover:border-orange-500/50 transition-all backdrop-blur-md group">
            <span class="text-2xl mr-4 group-hover:scale-110 transition-transform">💬</span>
            <span class="text-lg font-bold tracking-wide">망고 챗 연결</span>
        </a>
        <a href="../profile/profile_dashboard.html" class="flex items-center p-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-orange-500/20 hover:border-orange-500/50 transition-all backdrop-blur-md group">
            <span class="text-2xl mr-4 group-hover:scale-110 transition-transform">👤</span>
            <span class="text-lg font-bold tracking-wide">마이 프로필</span>
        </a>
        
        <!-- 하비 화면으로 돌아가기 -->
        <button onclick="history.back()" class="mt-6 py-3 w-full border border-zinc-700 rounded-xl text-zinc-400 font-medium hover:text-white hover:border-zinc-500 transition-colors">
            ✕ 닫기 (돌아가기)
        </button>
    </div>
</body>
</html>
