    width: 0px;
    height: 0px;

        .center-wrapper { 
            display: flex; 
            justify-content: center;

        .text-metallic-gold {

    /* 표준 + 웹킷 둘 다 */
    background-clip: text;
    -webkit-background-clip: text;

    /* 텍스트 색 투명 처리 */
    color: transparent;
    -webkit-text-fill-color: transparent;

    /* (선택) 더 반짝이는 효과 */
    background-size: 200% auto;
    animation: goldShine 3s linear infinite;
}

@keyframes goldShine {

    100% { background-position: 200% center; }
}

        .mango-window {

            backdrop-filter: blur(20px); /* 프리미엄 글래스모피즘 강화 */

            border: 2px solid transparent;
            /* Brown Gold Metallic 테마: 상단에서 하단으로 흐르는 메탈릭 골드 그라데이션 스펙트럼 */
            background-image: linear-gradient(rgba(5, 5, 5, 0.85), rgba(5, 5, 5, 0.85)), 
                              linear-gradient(to bottom, #fbbf24, #b45309, #451a03);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            border-radius: 2.5rem;
            padding: 2rem 1.5rem;
            padding-bottom: 6rem; /* [Scroll Safety] 하단 패딩 pb-24(6rem) 확보로 터치 간섭 방지 */
            /* [3D Embossing] 외측 광채와 내측 그림자의 정교한 레이어링 */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7),
                        0 0 30px rgba(251, 191, 36, 0.15),
                        inset 0 2px 4px rgba(255, 255, 255, 0.1),
                        inset 0 -2px 4px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: visible;
            margin-bottom: 40px;   /* 추가 */
            position: relative;
            z-index: 10;
        }

    /* 1. 금가루 내림 애니메이션 (배경 효과) */
    @keyframes gold-dust-fall {

    /* [Neon Pulsar Effect] 인디케이터 애니메이션 */
    .neon-indicator {
        width: 6px;
        height: 6px;
        background-color: #f97316;
        border-radius: 50%;
        display: inline-block;
        box-shadow: 0 0 8px #f97316, 0 0 15px #f97316;
        animation: neon-pulsar 1.5s ease-in-out infinite;
    }

    @keyframes neon-pulsar {
        0%, 100% { box-shadow: 0 0 8px #f97316, 0 0 12px #f97316; opacity: 0.7; transform: scale(1); }
        50% { box-shadow: 0 0 18px #f97316, 0 0 30px #f97316, 0 0 45px #ea580c; opacity: 1; transform: scale(1.2); }
    }

    /* 효과를 적용할 컨테이너 (금가루를 가리기 위해) */
    .mango-pulsar-wrapper {
        position: relative;
        overflow: visible;
        display: inline-block;
    }

    /* 맥동하는 MANGO 글자 클래스 */
    .mango-pulsing-text {
        animation: mango-pulse 1.8s ease-in-out infinite; /* 심장 박동 주기 */
        position: relative;
        z-index: 10;
        -webkit-text-stroke: 1px rgba(255, 215, 0, 0.2);
    }

    /* 금가루 입자 (가상 요소로 구현) */
    .mango-pulsar-wrapper::before,
    .mango-pulsar-wrapper::after {
        content: "";
        position: absolute;
        width: 3px; 
        height: 3px;
        background-color: #ffd700;
        border-radius: 50%;
        opacity: 0;
        z-index: 5;
        will-change: transform; /* [Gold Dust Optimization] 하드웨어 가속으로 애니메이션 성능 최적화 */
    }

    .mango-pulsar-wrapper::before {
        top: 0; left: 10%;
        animation: gold-dust-fall 2.5s linear infinite;
        box-shadow: 0 0 5px #ffd700, -10px 15px 8px #ffd700, 10px 25px 3px #ffa500;
    }

    .mango-pulsar-wrapper::after {
        top: -10px; right: 20%;
        animation: gold-dust-fall 3s linear infinite 0.5s;
        box-shadow: 0 0 5px #ffd700, 5px 12px 6px #ffd700, -15px 22px 4px #ffa500;

    <script>
        const Pi = window.Pi;
        let isSandbox = true; // 기본값은 테스트넷

        // [Dual-Method Convergence] 통합 네트워크 전환 제어 함수
        function handleNetworkSwitch(networkType) {
            isSandbox = (networkType === 'testnet');
            localStorage.setItem('mango_network_mode', networkType);

            const testBtn = document.getElementById('btn-testnet');
            const mainBtn = document.getElementById('btn-mainnet');

            if (isSandbox) {
                testBtn.className = "flex-1 py-3 rounded-xl text-[10px] font-black transition-all bg-orange-500 text-black shadow-[0_0_15px_rgba(249,115,22,0.6)] border-t border-white/30";
                mainBtn.className = "flex-1 py-3 rounded-xl text-[10px] font-black transition-all bg-zinc-900 text-zinc-600 border border-zinc-800 opacity-50";
            } else {
                mainBtn.className = "flex-1 py-3 rounded-xl text-[10px] font-black transition-all bg-yellow-500 text-black shadow-[0_0_15px_rgba(234,179,8,0.6)] border-t border-white/30";
                testBtn.className = "flex-1 py-3 rounded-xl text-[10px] font-black transition-all bg-zinc-900 text-zinc-600 border border-zinc-800 opacity-50";
            }
            showToast(isSandbox ? "테스트넷 결제 모드 활성" : "메인넷 결제 모드 활성");
        }

        async function processMangoPayment() {
            try {
                // [Security] Strict Boolean Check for Sandbox
                await Pi.init({ version: "2.0", sandbox: !!isSandbox }).catch(e => {
                    throw new Error("SDK 초기화 지연 (네트워크 확인 요망)");
                });
                
                showToast("사용자 인증 확인 중...");
                await Pi.authenticate(['payments'], (p) => { 
                    console.warn("Incomplete payment found:", p); 
                }).catch(e => {
                    throw new Error("인증 세션 오류");
                });

                showToast("🚀 파이 결제창을 호출합니다...");
                
                await Pi.createPayment({
                    amount: 0.02,
                    memo: isSandbox ? "[SANDBOX] Mango Logistics Fee" : "Mango Logistics Service Fee",
                    metadata: { portal: "transfer", network: isSandbox ? "testnet" : "mainnet" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        return fetch('https://mango-os-6xu2.vercel.app/api/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, network: isSandbox ? "testnet" : "mainnet" })
                        }).catch(e => { throw new Error("Approval 서버 통신 장애"); });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        return fetch('https://mango-os-6xu2.vercel.app/api/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid, network: isSandbox ? "testnet" : "mainnet" })
                        }).then(async (res) => {
                            if(!res.ok) throw new Error("결제 완료 검증 실패");
                            
                            // 포인트 즉시 동기화
                            const currentPoint = parseFloat(localStorage.getItem("mangoPoint") || "0");
                            const newPoint = (currentPoint + 0.001).toFixed(3);
                            localStorage.setItem("mangoPoint", newPoint);
                            updatePointUI();
                            showToast(`✅ 결제 완료 + 0.001P 적립!`);
                        });
                    },
                    onCancel: (pId) => showToast("❌ 결제 취소"),
                    onError: (err) => showToast(`⚠️ 결제 오류: ${err.message}`)
                });
            } catch (err) {
                showToast(`⚠️ 시스템 오류: ${err.message}`);
            }
        }

        function showToast(msg) {
            const container = document.getElementById("toast-container");
            if(!container) return;

            const t = document.createElement("div");
            t.className = "bg-orange-600/95 backdrop-blur-md text-white px-6 py-2.5 rounded-full shadow-2xl text-[10px] font-bold whitespace-nowrap animate-toast-up border border-white/10 pointer-events-none transition-all duration-500 mb-1";
            t.innerHTML = msg; 
            
            container.appendChild(t);

            // 3초 후 순차적 소멸 로직
            setTimeout(() => {
                t.style.opacity = "0";
                t.style.transform = "translateY(-20px)";
                setTimeout(() => t.remove(), 500);
            }, 3000);
        }

        // [시작점] Transfer AI 컨시어지 스크립트 로직
        // AI 챗봇 창 열기/닫기
        function toggleAiChat() {
            const modal = document.getElementById('ai-chat-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        // AI 메시지 전송 및 응답 (물류 테마)
        function sendAiMessage() {
            const input = document.getElementById('ai-chat-input');
            const log = document.getElementById('ai-chat-log');
            const msg = input.value.trim();
            if(!msg) return;

            // 사용자 메시지 출력
            log.innerHTML += `<div class="user-msg">${msg}</div>`;
            input.value = '';

            setTimeout(() => {
                let aiReply = "물류 접수가 확인되었습니다. 보다 정확한 배차를 위해 출발지와 도착지를 입력해주시겠습니까?";
                
                if(msg.includes('택시')) {
                    aiReply = "망고 택시 호출을 도와드리겠습니다. 현재 센텀시티 근처에 대기 중인 VVIP 택시가 3대 있습니다. 즉시 배차할까요?";
                } else if(msg.includes('이사') || msg.includes('포장')) {
                    aiReply = "포장이사 서비스 안내입니다. AI 비전 카메라로 짐 사진을 올려주시면 파이(π) 결제 견적을 즉시 산출해 드립니다.";
                } else if(msg.includes('수수료') || msg.includes('결제')) {
                    aiReply = "물류 중개 수수료는 고정 **0.02 π** 입니다. 하단의 'PROCEED PAYMENT' 버튼을 눌러 에스크로 결제를 진행하실 수 있습니다.";
                }

                // AI 응답 출력
                log.innerHTML += `<div class="ai-msg">${aiReply}</div>`;
                log.scrollTop = log.scrollHeight;
            }, 600);
        }
// [끝점]
    </script>
    <script>
document.querySelectorAll('a').forEach(el => {
    el.addEventListener('touchstart', function(){}, {passive:true});
});

function goPayment() {
    processMangoPayment();
}

function updatePointUI() {
    const el = document.getElementById("point-balance");
    if(!el) return;

    const point = parseFloat(localStorage.getItem("mangoPoint") || "0");
    el.textContent = (isNaN(point) ? 0 : point).toFixed(3) + " P";
}

// [Initialization Trigger] 메인 이니셜라이저 엔진 가동
document.addEventListener('DOMContentLoaded', () => {
    // 1. 포인트 정보 동기화
    updatePointUI();

    // 2. 네트워크 상태 복원 및 UI 반영
    const savedMode = localStorage.getItem('mango_network_mode') || 'testnet';
    handleNetworkSwitch(savedMode);

    console.log("Mango Portal: Runtime System Initialized");
});
