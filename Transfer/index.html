<style>
    @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap');
    /* 기존 스타일 유지 */

    /* 1. 금가루 내림 애니메이션 (배경 효과) */
    @keyframes gold-dust-fall {
        0% { transform: translateY(-20px) translateX(0); opacity: 0; }
        20% { opacity: 1; }
        100% { transform: translateY(30px) translateX(15px); opacity: 0; }
    }

    /* 2. 맥동 애니메이션 (글자 테두리 광채) */
    @keyframes mango-pulse {
        0%, 100% {
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
            filter: drop-shadow(0 0 5px rgba(255, 115, 0, 0.3));
        }
        50% {
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
            filter: drop-shadow(0 0 10px rgba(255, 115, 0, 0.6));
        }
    }

    /* 효과를 적용할 컨테이너 (금가루를 가리기 위해) */
    .mango-pulsar-wrapper {
        position: relative;
        overflow: visible;
        display: inline-block;
    }

    /* 맥동하는 MANGO 글자 클래스 */
    .mango-pulsing-text {
        animation: mango-pulse 1.8s ease-in-out infinite; /* 심장 박동 주기 */
        position: relative;
        z-index: 10;
        -webkit-text-stroke: 1px rgba(255, 215, 0, 0.2);
    }

    /* 금가루 입자 (가상 요소로 구현) */
    .mango-pulsar-wrapper::before,
    .mango-pulsar-wrapper::after {
        content: "";
        position: absolute;
        width: 3px; 
        height: 3px;
        background-color: #ffd700;
        border-radius: 50%;
        opacity: 0;
        z-index: 5;
    }

    .mango-pulsar-wrapper::before {
        top: 0; left: 10%;
        animation: gold-dust-fall 2.5s linear infinite;
        box-shadow: 0 0 5px #ffd700, -10px 15px 8px #ffd700, 10px 25px 3px #ffa500;
    }

    .mango-pulsar-wrapper::after {
        top: -10px; right: 20%;
        animation: gold-dust-fall 3s linear infinite 0.5s;
        box-shadow: 0 0 5px #ffd700, 5px 12px 6px #ffd700, -15px 22px 4px #ffa500;
    }

</style>

    <div class="grid grid-cols-2 gap-4">

        </div>

        <div onclick="location.href='mango_quick_dashboard.html'" class="group bg-gray-800/40 p-4 rounded-2xl border border-gray-700 hover:border-orange-500 transition-all cursor-pointer">
            <div class="w-24 h-24 mx-auto mb-2 flex items-center justify-center overflow-hidden">
                <img src="/assets/img/Quick-Service.png" alt="Quick" class="w-full h-full object-contain group-hover:scale-110 transition-transform">
            </div>
            <p class="text-white text-xs font-bold text-center">퀵서비스</p>
        </div>

        <div onclick="location.href='mango_taxi_dashboard.html'" class="group bg-gray-800/40 p-4 rounded-2xl border border-gray-700 hover:border-orange-500 transition-all cursor-pointer">
            <div class="w-24 h-24 mx-auto mb-2 flex items-center justify-center overflow-hidden">

            </div>

        </div>
    </div>
    <div class="mt-8 bg-black/60 p-5 rounded-[2rem] border border-orange-500/30 shadow-2xl">
        <div class="flex justify-between items-center mb-4 px-2">
            <span class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Logistics Fee</span>
            <div class="flex items-center gap-1">
                <span class="text-2xl font-black text-metallic-gold">0.02</span>
                <span class="text-sm font-bold text-yellow-500">π</span>
            </div>
        </div>

        <div class="flex gap-2 mb-4">
            <button id="btn-testnet" onclick="setPaymentMode(true)" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all bg-orange-500 text-black shadow-[0_0_15px_rgba(249,115,22,0.4)]">TESTNET</button>
            <button id="btn-mainnet" onclick="setPaymentMode(false)" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all bg-gray-800 text-gray-500 border border-gray-700">MAINNET</button>
        </div>

        <button onclick="processMangoPayment()" class="w-full bg-gradient-to-r from-orange-500 to-yellow-600 text-black py-4 rounded-2xl font-black text-sm hover:scale-[1.02] active:scale-95 transition-all shadow-lg">
            PROCEED PAYMENT
        </button>

    <div id="toast" class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-orange-600/90 backdrop-blur-md text-white px-6 py-2 rounded-full opacity-0 pointer-events-none transition-opacity duration-300 z-50 text-[10px] font-bold whitespace-nowrap"></div>
    </div>
        </div>
    </div>
    <script>
        const Pi = window.Pi;
        let isSandbox = true; // 기본값은 테스트넷

        // 1. 결제 모드 스위칭 함수
        function setPaymentMode(mode) {
            isSandbox = mode;
            const testBtn = document.getElementById('btn-testnet');
            const mainBtn = document.getElementById('btn-mainnet');

            if(mode) {
                testBtn.className = "flex-1 py-2 rounded-lg text-[10px] font-black transition-all bg-orange-500 text-black shadow-[0_0_10px_rgba(249,115,22,0.5)]";
                mainBtn.className = "flex-1 py-2 rounded-lg text-[10px] font-black transition-all bg-gray-800 text-gray-400 border border-gray-700";
            } else {
                mainBtn.className = "flex-1 py-2 rounded-lg text-[10px] font-black transition-all bg-yellow-500 text-black shadow-[0_0_10px_rgba(234,179,8,0.5)]";
                testBtn.className = "flex-1 py-2 rounded-lg text-[10px] font-black transition-all bg-gray-800 text-gray-400 border border-gray-700";
            }
            showToast(mode ? "테스트넷 결제 모드 활성" : "메인넷 결제 모드 활성");
        }

        // 2. 통합 결제 실행 함수
        async function processMangoPayment() {
            try {
                // 초기화 (선택한 모드에 따라)
                await Pi.init({ version: "2.0", sandbox: isSandbox });
                
                showToast("사용자 인증 확인 중...");
                await Pi.authenticate(['payments'], (p) => { console.log("미완료 결제:", p); });

                showToast("🚀 파이 결제창을 호출합니다...");
                
                await Pi.createPayment({
                    amount: 0.02,
                    memo: isSandbox ? "[TEST] Mango Logistics Fee" : "Mango Logistics Service Fee",
                    metadata: { portal: "transfer", network: isSandbox ? "testnet" : "mainnet" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        return fetch('https://mango-os-6xu2.vercel.app/api/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId })
                        });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        return fetch('https://mango-os-6xu2.vercel.app/api/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid })
                        }).then(() => {
                            showToast("✅ 결제가 완료되었습니다!");
                        });
                    },
                    onCancel: (pId) => showToast("❌ 결제 취소"),
                    onError: (err) => showToast("⚠️ 에러: " + err.message)
                });
            } catch (err) {
                showToast("⚠️ 인증/시스템 오류");
            }
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            if(!t) return;
            t.textContent = msg;
            t.style.opacity = "1";
            setTimeout(() => { t.style.opacity = "0"; }, 3000);
        }
    </script>
</body>
