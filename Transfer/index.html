<style>
    @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap');
    /* 기존 스타일 유지 */

    /* 1. 금가루 내림 애니메이션 (배경 효과) */
    @keyframes gold-dust-fall {
        0% { transform: translateY(-20px) translateX(0); opacity: 0; }
        20% { opacity: 1; }
        100% { transform: translateY(30px) translateX(15px); opacity: 0; }
    }

    /* 2. 맥동 애니메이션 (글자 테두리 광채) */
    @keyframes mango-pulse {
        0%, 100% {
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
            filter: drop-shadow(0 0 5px rgba(255, 115, 0, 0.3));
        }
        50% {
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
            filter: drop-shadow(0 0 10px rgba(255, 115, 0, 0.6));
        }
    }

    /* 효과를 적용할 컨테이너 (금가루를 가리기 위해) */
    .mango-pulsar-wrapper {
        position: relative;
        overflow: visible;
        display: inline-block;
    }

    /* 맥동하는 MANGO 글자 클래스 */
    .mango-pulsing-text {
        animation: mango-pulse 1.8s ease-in-out infinite; /* 심장 박동 주기 */
        position: relative;
        z-index: 10;
        -webkit-text-stroke: 1px rgba(255, 215, 0, 0.2);
    }

    /* 금가루 입자 (가상 요소로 구현) */
    .mango-pulsar-wrapper::before,
    .mango-pulsar-wrapper::after {
        content: "";
        position: absolute;
        width: 3px; 
        height: 3px;
        background-color: #ffd700;
        border-radius: 50%;
        opacity: 0;
        z-index: 5;
    }

    .mango-pulsar-wrapper::before {
        top: 0; left: 10%;
        animation: gold-dust-fall 2.5s linear infinite;
        box-shadow: 0 0 5px #ffd700, -10px 15px 8px #ffd700, 10px 25px 3px #ffa500;
    }

    .mango-pulsar-wrapper::after {
        top: -10px; right: 20%;
        animation: gold-dust-fall 3s linear infinite 0.5s;
        box-shadow: 0 0 5px #ffd700, 5px 12px 6px #ffd700, -15px 22px 4px #ffa500;
    }

    /* [시작점] AI Chat 메시지 스타일 보정 (Transfer 테마) */
.user-msg { 
    align-self: flex-end; background: #f97316; /* 오렌지 톤 */
    color: white; padding: 10px 16px; border-radius: 1.5rem 1.5rem 0 1.5rem;

.ai-msg {

}
#ai-chat-log { display: flex; flex-direction: column; }
/* [끝점] */

    <script>
        const Pi = window.Pi;
        let isSandbox = true; // 기본값은 테스트넷

        // 1. 결제 모드 스위칭 함수
        function setPaymentMode(mode) {
            isSandbox = mode;
            const testBtn = document.getElementById('btn-testnet');
            const mainBtn = document.getElementById('btn-mainnet');

            if(mode) {
                testBtn.className = "flex-1 py-2 rounded-lg text-[10px] font-black transition-all bg-orange-500 text-black shadow-[0_0_10px_rgba(249,115,22,0.5)]";
                mainBtn.className = "flex-1 py-2 rounded-lg text-[10px] font-black transition-all bg-gray-800 text-gray-400 border border-gray-700";
            } else {
                mainBtn.className = "flex-1 py-2 rounded-lg text-[10px] font-black transition-all bg-yellow-500 text-black shadow-[0_0_10px_rgba(234,179,8,0.5)]";
                testBtn.className = "flex-1 py-2 rounded-lg text-[10px] font-black transition-all bg-gray-800 text-gray-400 border border-gray-700";
            }
            showToast(mode ? "테스트넷 결제 모드 활성" : "메인넷 결제 모드 활성");
        }

        // 2. 통합 결제 실행 함수
        async function processMangoPayment() {
            try {
                // 초기화 (선택한 모드에 따라)
                await Pi.init({ version: "2.0", sandbox: isSandbox });
                
                showToast("사용자 인증 확인 중...");
                await Pi.authenticate(['payments'], (p) => { console.log("미완료 결제:", p); });

                showToast("🚀 파이 결제창을 호출합니다...");
                
                await Pi.createPayment({
                    amount: 0.02,
                    memo: isSandbox ? "[TEST] Mango Logistics Fee" : "Mango Logistics Service Fee",
                    metadata: { portal: "transfer", network: isSandbox ? "testnet" : "mainnet" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        return fetch('https://mango-os-6xu2.vercel.app/api/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId })
                        });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
    return fetch('https://mango-os-6xu2.vercel.app/api/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paymentId, txid })
    }).then(() => {

        // 🔥 포인트 지급 UI 반영
        let point = parseFloat(localStorage.getItem("mangoPoint") || "0");
        point += 0.001;  // 👉 예: 0.001 포인트 지급
        localStorage.setItem("mangoPoint", point);

        updatePointUI();

        showToast("✅ 결제 완료 + 0.001P 지급!");
    });
},
                    onCancel: (pId) => showToast("❌ 결제 취소"),
                    onError: (err) => showToast("⚠️ 에러: " + err.message)
                });
            } catch (err) {
                showToast("⚠️ 인증/시스템 오류");
            }
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            if(!t) return;
            t.textContent = msg;
            t.style.opacity = "1";
            setTimeout(() => { t.style.opacity = "0"; }, 3000);
        }

        // [시작점] Transfer AI 컨시어지 스크립트 로직
        // AI 챗봇 창 열기/닫기
        function toggleAiChat() {
            const modal = document.getElementById('ai-chat-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        // AI 메시지 전송 및 응답 (물류 테마)
        function sendAiMessage() {
            const input = document.getElementById('ai-chat-input');
            const log = document.getElementById('ai-chat-log');
            const msg = input.value.trim();
            if(!msg) return;

            // 사용자 메시지 출력
            log.innerHTML += `<div class="user-msg">${msg}</div>`;
            input.value = '';

            setTimeout(() => {
                let aiReply = "물류 접수가 확인되었습니다. 보다 정확한 배차를 위해 출발지와 도착지를 입력해주시겠습니까?";
                
                if(msg.includes('택시')) {
                    aiReply = "망고 택시 호출을 도와드리겠습니다. 현재 센텀시티 근처에 대기 중인 VVIP 택시가 3대 있습니다. 즉시 배차할까요?";
                } else if(msg.includes('이사') || msg.includes('포장')) {
                    aiReply = "포장이사 서비스 안내입니다. AI 비전 카메라로 짐 사진을 올려주시면 파이(π) 결제 견적을 즉시 산출해 드립니다.";
                } else if(msg.includes('수수료') || msg.includes('결제')) {
                    aiReply = "물류 중개 수수료는 고정 **0.02 π** 입니다. 하단의 'PROCEED PAYMENT' 버튼을 눌러 에스크로 결제를 진행하실 수 있습니다.";
                }

                // AI 응답 출력
                log.innerHTML += `<div class="ai-msg">${aiReply}</div>`;
                log.scrollTop = log.scrollHeight;
            }, 600);
        }
// [끝점]
    </script>

<script>
let mode = "testnet";

function setMode(selected) {
    mode = selected;

    const testBtn = document.getElementById("btn-testnet");
    const mainBtn = document.getElementById("btn-mainnet");

    if (selected === "testnet") {
        testBtn.classList.add("bg-orange-500", "text-black");
        testBtn.classList.remove("bg-gray-800", "text-gray-500");

        mainBtn.classList.add("bg-gray-800", "text-gray-500");
        mainBtn.classList.remove("bg-orange-500", "text-black");
    } else {
        mainBtn.classList.add("bg-orange-500", "text-black");
        mainBtn.classList.remove("bg-gray-800", "text-gray-500");

        testBtn.classList.add("bg-gray-800", "text-gray-500");
        testBtn.classList.remove("bg-orange-500", "text-black");
    }
}
</script>
<script>
function goPayment() {
    alert("현재 모드: " + mode);

    if (mode === "testnet") {
        processMangoPayment();  // 👉 실제 Pi 결제 실행
    } else {
        processMangoPayment();  // 👉 동일 (sandbox false로 처리됨)
    }
}

function updatePointUI() {
    const el = document.getElementById("point-balance");
    if(!el) return;

    const point = localStorage.getItem("mangoPoint") || "0";
    el.textContent = point + " P";
}



</script>
