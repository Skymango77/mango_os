<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mango AI Navigation Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbit&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0a0a0a] text-white h-[100dvh] w-screen flex flex-col items-center justify-center relative overflow-hidden font-sans">
    
    <!-- 배경 은은한 오렌지/골드 라이팅 효과 -->
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-orange-900/30 via-black to-black z-0 pointer-events-none"></div>

    <!-- 상단 AI 비주얼 -->
    <div class="z-10 text-center mb-10 w-full px-6">
        <div class="w-24 h-24 mx-auto rounded-full border-4 border-yellow-500 p-[2px] shadow-[0_0_35px_rgba(249,115,22,0.6)] mb-6 animate-pulse">
            <img src="../img/Mango_gold.jpg" alt="Mango AI" class="w-full h-full object-cover rounded-full">
        </div>
        <h1 class="text-3xl font-black italic bg-clip-text text-transparent bg-gradient-to-r from-yellow-300 via-orange-500 to-yellow-700 tracking-wider">MANGO A.I. HUB</h1>
        <p class="text-orange-500/80 text-[10px] mt-2 font-orbit tracking-[0.3em] uppercase">Navigation System Active</p>
    </div>

    <!-- 네비게이션 메뉴 리스트 (글래스모피즘 카드) -->
    <div class="z-10 w-full max-w-xs flex flex-col gap-3">
        <a href="../index.html" class="flex items-center p-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-orange-500/20 hover:border-orange-500/50 transition-all backdrop-blur-md group">
            <span class="text-2xl mr-4 group-hover:scale-110 transition-transform">🏠</span>
            <span class="text-lg font-bold tracking-wide">망고 메인 포털</span>
        </a>
        <a href="Hobby_Explore.html" class="flex items-center p-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-orange-500/20 hover:border-orange-500/50 transition-all backdrop-blur-md group">
            <span class="text-2xl mr-4 group-hover:scale-110 transition-transform">🔭</span>
            <span class="text-lg font-bold tracking-wide">취미 탐색</span>
        </a>
        <a href="../Chat/index.html" class="flex items-center p-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-orange-500/20 hover:border-orange-500/50 transition-all backdrop-blur-md group">
            <span class="text-2xl mr-4 group-hover:scale-110 transition-transform">💬</span>
            <span class="text-lg font-bold tracking-wide">망고 챗 연결</span>
        </a>
        <a href="Hobby_Profile.html" class="flex items-center p-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-orange-500/20 hover:border-orange-500/50 transition-all backdrop-blur-md group">
            <span class="text-2xl mr-4 group-hover:scale-110 transition-transform">👤</span>
            <span class="text-lg font-bold tracking-wide">마이 프로필</span>
        </a>
        
        <!-- 하비 화면으로 돌아가기 -->
        <button onclick="history.back()" class="mt-6 py-3 w-full border border-zinc-700 rounded-xl text-zinc-400 font-medium hover:text-white hover:border-zinc-500 transition-colors">
            ✕ 닫기 (돌아가기)
        </button>
    </div>
</body>
</html>
