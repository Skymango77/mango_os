# 🥭 Mango Global Realty - 검색 엔진 초고도화 작업 (2026-04-01)

## 1. 작업 내용
- **위치:** `Realty/index.html` 내 `renderRealtyList` 함수
- **핵심 업데이트:** 글로벌 다중 키워드 교집합(AND) 검색 엔진 탑재.

## 2. 엔진 기술 명세서
- **통합 검색 범위:** 제목(`title`), 위치(`location`), 설명(`desc`), 태그(`tag`)를 하나의 데이터 스트림으로 통합.
- **다중 키워드 처리:** 정규식(`/\s+/`)을 사용해 사용자 입력값을 단어 단위로 분리.
- **AND 필터링 로직:** `Array.prototype.every()`를 활용하여 사용자가 입력한 모든 단어가 포함된 매물만 정확하게 추출.
- **안전성(Safety):** 가격 문자열 파싱 시 정규식(`replace(/,/g, '')`) 적용 및 Null 예외 처리(`trim()`) 강화.

## 3. 검색 활용 예시
- `부산 오션뷰` -> 부산에 위치하며 오션뷰 태그/설명을 가진 매물 검색.
- `Sydney Luxury` -> 시드니에 위치한 럭셔리 등급 매물 검색.
- 검색어에 대소문자가 섞여 있거나, 띄어쓰기가 여러 번 들어가도 완벽하게 필터링됨.