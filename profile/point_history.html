<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mango Wallet | Transaction History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../assets/js/globalWallet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --mango-gold: #f59e0b; --bg-dark: #030305; }
        body { background-color: var(--bg-dark); font-family: 'Inter', sans-serif; color: white; -webkit-tap-highlight-color: transparent; }
        .font-orb { font-family: 'Orbitron', sans-serif; }
        .premium-glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2.5rem; }
        .gold-glow { text-shadow: 0 0 20px rgba(245, 158, 11, 0.5); }
        .tx-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-left: 4px solid transparent; }
        .tx-item:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }
        
        /* Portal Specific Accents */
        .portal-Travel { border-left-color: #6366f1; }
        .portal-Food { border-left-color: #f87171; }
        .portal-Market { border-left-color: #f472b6; }
        .portal-Realty { border-left-color: #fbbf24; }
        .portal-Education { border-left-color: #818cf8; }
        .portal-Transfer { border-left-color: #22d3ee; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="w-full min-h-screen flex flex-col items-center pb-20">

    <!-- Header -->
    <header class="w-full max-w-[450px] p-6 flex justify-between items-center sticky top-0 z-50 bg-[#030305]/80 backdrop-blur-xl border-b border-white/5">
        <button onclick="history.back()" class="p-2 bg-white/5 rounded-xl"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
        <h1 class="font-orb text-lg font-black italic tracking-widest text-mango-gold">ASSET_LEDGER</h1>
        <button class="p-2 bg-white/5 rounded-xl"><i data-lucide="filter" class="w-5 h-5 text-gray-400"></i></button>
    </header>

    <main class="w-full max-w-[450px] px-4 mt-6 space-y-8">
        <!-- Balance Dashboard -->
        <section class="premium-glass p-8 relative overflow-hidden">
            <div class="absolute -right-12 -top-12 w-40 h-40 bg-orange-500/10 blur-3xl rounded-full"></div>
            
            <div class="space-y-8 relative z-10">
                <div>
                    <p class="text-[10px] text-gray-500 font-black uppercase tracking-[0.3em] mb-2">Total Pi Balance</p>
                    <div class="flex items-baseline gap-2">
                        <h2 class="text-5xl font-black font-orb gold-glow global-pi-val">0.00</h2>
                        <span class="text-xl font-bold text-orange-500 font-orb italic">π</span>
                    </div>
                </div>

                <div class="h-px bg-white/10"></div>

                <div>
                    <p class="text-[10px] text-gray-500 font-black uppercase tracking-[0.3em] mb-2">MNG Rewards Pool</p>
                    <div class="flex items-baseline gap-2">
                        <h2 class="text-3xl font-black font-orb text-white/90 global-mng-val">0.00</h2>
                        <span class="text-sm font-bold text-indigo-400 font-orb italic">MNG</span>
                    </div>
                </div>
            </div>

            <div class="mt-8 flex gap-3">
                <button class="flex-1 py-4 bg-white text-black font-black rounded-2xl text-[10px] uppercase tracking-widest active:scale-95 transition-all">Deposit π</button>
                <button class="flex-1 py-4 bg-white/10 border border-white/10 rounded-2xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">Staking</button>
            </div>
        </section>

        <!-- Transaction History -->
        <section class="space-y-4">
            <div class="flex justify-between items-end px-2">
                <h3 class="text-xs font-black text-white uppercase tracking-widest">Transaction History</h3>
                <span class="text-[9px] text-gray-500 font-bold uppercase tracking-tighter">All Portals Synchronized</span>
            </div>

            <div id="history-list" class="space-y-3">
                <!-- Rendered by JS -->
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();

        function renderHistory() {
            const list = document.getElementById('history-list');
            const history = MangoWallet.getHistory();
            
            const portalIcons = {
                'Travel': 'plane',
                'Food': 'utensils',
                'Market': 'shopping-bag',
                'Realty': 'home',
                'Education': 'graduation-cap',
                'Transfer': 'car'
            };

            list.innerHTML = history.map(tx => {
                const isPositive = tx.amount > 0;
                const icon = portalIcons[tx.portal] || 'hash';
                const symbol = tx.type === 'pi' ? 'π' : 'MNG';
                const colorClass = tx.type === 'pi' ? 'text-white' : 'text-indigo-400';

                return `
                    <div class="tx-item premium-glass p-4 flex items-center justify-between portal-${tx.portal}">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-gray-400">
                                <i data-lucide="${icon}" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <h4 class="text-[13px] font-bold text-white/90 leading-tight">${tx.desc}</h4>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-[9px] font-black text-gray-500 uppercase tracking-tighter">${tx.portal}</span>
                                    <span class="w-1 h-1 bg-white/10 rounded-full"></span>
                                    <span class="text-[9px] font-medium text-gray-600">${tx.date}</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black italic ${isPositive ? 'text-emerald-400' : colorClass}">
                                ${isPositive ? '+' : ''}${tx.amount.toFixed(1)} ${symbol}
                            </p>
                            <p class="text-[8px] text-gray-600 font-bold uppercase mt-1">Confirmed</p>
                        </div>
                    </div>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', renderHistory);
    </script>
</body>
</html>
