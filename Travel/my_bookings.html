<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mango Travel | My Bookings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/styles/mango-core.css">
    <style>
        .booking-card { transition: all 0.3s ease; }
        .booking-card:hover { transform: translateY(-5px); border-color: var(--mango-gold); }
        .status-used { background: rgba(0, 0, 0, 0.5) !important; backdrop-filter: blur(12px) grayscale(100%); opacity: 0.6; }
    </style>
</head>
<body class="max-w-[480px] mx-auto min-h-screen bg-[#050505] text-white pb-24 font-sans">
    <!-- Header -->
    <header class="p-6 border-b border-white/5 flex items-center justify-between sticky top-0 bg-black/80 backdrop-blur-lg z-50">
        <button onclick="history.back()" class="p-2 hover:bg-white/5 rounded-full transition-colors">
            <i data-lucide="chevron-left"></i>
        </button>
        <h1 class="font-orbitron font-black italic text-xl tracking-tighter text-amber-500 uppercase">My <span class="text-white">Bookings</span></h1>
        <div id="active-count-badge" class="bg-amber-500 text-black text-[10px] font-black px-3 py-1 rounded-full shadow-lg shadow-amber-500/20">0 Active</div>
    </header>

    <!-- Filters -->
    <div class="px-6 py-4 flex gap-3 overflow-x-auto no-scrollbar">
        <button onclick="setFilter('ALL')" id="filter-all" class="filter-btn px-4 py-2 rounded-full bg-amber-500 text-black text-[10px] font-black uppercase tracking-widest whitespace-nowrap active:scale-95 transition-all">전체보기</button>
        <button onclick="setFilter('FLIGHT')" id="filter-flight" class="filter-btn px-4 py-2 rounded-full bg-white/5 border border-white/10 text-white/60 text-[10px] font-black uppercase tracking-widest whitespace-nowrap active:scale-95 transition-all">항공권만</button>
        <button onclick="setFilter('HOTEL')" id="filter-hotel" class="filter-btn px-4 py-2 rounded-full bg-white/5 border border-white/10 text-white/60 text-[10px] font-black uppercase tracking-widest whitespace-nowrap active:scale-95 transition-all">호텔만</button>
    </div>

    <main class="p-6 space-y-6" id="bookings-list">
        <!-- JS에 의해 예약 내역이 주입됩니다 -->
    </main>

    <!-- Empty State -->
    <div id="empty-state" class="hidden flex flex-col items-center justify-center py-40 opacity-20">
        <i data-lucide="calendar-x" class="w-16 h-16 mb-4"></i>
        <p class="font-bold uppercase tracking-widest italic text-sm">No bookings found</p>
    </div>

    <!-- QR Modal for Offline Verification -->
    <div id="qr-modal" class="fixed inset-0 z-[100] hidden bg-black/95 backdrop-blur-2xl flex items-center justify-center p-6" onclick="closeQRModal()">
        <div class="glass p-10 rounded-[3rem] border-amber-500/30 text-center" onclick="event.stopPropagation()">
            <h2 class="text-xl font-black italic text-amber-500 uppercase mb-6 tracking-tighter">Verification <span class="text-white">QR</span></h2>
            <div class="bg-white p-4 rounded-3xl inline-block mb-6 shadow-[0_0_50px_rgba(255,215,0,0.2)]">
                <img id="modal-qr-img" src="" alt="QR Code" class="w-48 h-48">
            </div>
            <p id="qr-identifier" class="font-mono text-zinc-500 text-xs mb-8 tracking-[0.3em] uppercase font-bold">---</p>
            <button onclick="closeQRModal()" class="w-full py-5 mango-gradient text-black font-black rounded-2xl text-xs uppercase tracking-widest active:scale-95 transition-all">Close</button>
        </div>
    </div>

    <!-- Premium Receipt Modal -->
    <div id="receipt-modal" class="fixed inset-0 z-[110] hidden bg-black/95 backdrop-blur-2xl flex items-center justify-center p-6" onclick="closeReceiptModal()">
        <div class="w-full max-w-[400px] flex flex-col gap-6" onclick="event.stopPropagation()">
            <div id="receipt-capture-area" class="bg-[#111] p-10 rounded-[3rem] border border-white/10 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8 opacity-5"><i data-lucide="pi" class="w-32 h-32 text-amber-500"></i></div>
                
                <div class="text-center mb-10">
                    <h2 class="font-orbitron font-black italic text-amber-500 text-2xl tracking-tighter uppercase mb-1">Mango <span class="text-white">Receipt</span></h2>
                    <p class="text-[9px] text-zinc-500 font-bold tracking-[0.4em] uppercase">Official Digital Voucher</p>
                </div>

                <div class="space-y-6 border-y border-white/5 py-8 mb-8">
                    <div class="flex justify-between text-xs"><span class="text-zinc-500 font-bold uppercase">Service</span><span id="r-type" class="font-black text-white italic">---</span></div>
                    <div class="flex justify-between text-xs"><span class="text-zinc-500 font-bold uppercase">Item</span><span id="r-name" class="font-black text-white italic">---</span></div>
                    <div class="flex justify-between text-xs"><span class="text-zinc-500 font-bold uppercase">Identifier</span><span id="r-id" class="font-mono font-black text-amber-500">---</span></div>
                    <div class="flex justify-between text-xs"><span class="text-zinc-500 font-bold uppercase">Date</span><span id="r-date" class="font-black text-white">---</span></div>
                    
                    <div class="pt-6 border-t border-dashed border-white/10 flex justify-between items-end">
                        <span class="text-[10px] font-black text-zinc-500 uppercase">Total Paid</span>
                        <span id="r-amount" class="text-3xl font-black text-amber-500 italic tracking-tighter">---</span>
                    </div>
                </div>

                <div class="flex justify-center">
                    <div class="bg-white p-2 rounded-2xl inline-block shadow-lg">
                        <img id="r-qr" src="" class="w-24 h-24">
                    </div>
                </div>
                
                <p class="text-[8px] text-center text-zinc-600 mt-8 uppercase font-bold tracking-widest">Secured by Mango Blockchain Protocol</p>
            </div>

            <div class="flex gap-4">
                <button onclick="saveReceiptImage()" class="flex-1 py-5 mango-gradient text-black font-black rounded-2xl text-xs uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="download" class="w-4 h-4"></i> Save Image
                </button>
                <button onclick="closeReceiptModal()" class="px-8 py-5 bg-white/5 text-white/40 font-bold rounded-2xl text-xs uppercase tracking-widest">Close</button>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto bg-[#0f172a]/95 backdrop-blur-xl border-t border-white/5 px-8 py-5 flex justify-between items-center z-[100]">
        <a href="index.html" class="flex flex-col items-center gap-1 opacity-30 hover:opacity-100 transition-opacity">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Home</span>
        </a>
        <a href="Travel_mall.html" class="flex flex-col items-center gap-1 opacity-30 hover:opacity-100 transition-opacity">
            <i data-lucide="plane" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Travel</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-amber-500">
            <i data-lucide="ticket" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Bookings</span>
        </a>
    </nav>

    <script>
        let currentFilter = 'ALL';

        window.setFilter = (filter) => {
            currentFilter = filter;
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(btn => {
                btn.classList.replace('bg-amber-500', 'bg-white/5');
                btn.classList.replace('text-black', 'text-white/60');
                btn.classList.add('border', 'border-white/10');
            });
            const activeBtn = document.getElementById(`filter-${filter.toLowerCase()}`);
            activeBtn.classList.replace('bg-white/5', 'bg-amber-500');
            activeBtn.classList.replace('text-white/60', 'text-black');
            activeBtn.classList.remove('border', 'border-white/10');
            renderBookings();
        }

        function renderBookings() {
            const list = document.getElementById('bookings-list');
            const empty = document.getElementById('empty-state');
            const badge = document.getElementById('active-count-badge');
            let history = JSON.parse(localStorage.getItem('mango_booking_history') || '[]');

            // 필터링 적용
            if (currentFilter !== 'ALL') history = history.filter(b => b.type === currentFilter);

            if (history.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                if (badge) badge.innerText = "0 Active";
                return;
            }
            empty.classList.add('hidden');

            // 1. 유효 예약 개수 계산 및 배지 업데이트
            const activeCount = history.filter(b => b.status !== 'USED').length;
            if (badge) badge.innerText = `${activeCount} Active`;

            // 2. 정렬: USED 상태를 하단으로 배치, 그 외에는 최신순 정렬
            history.sort((a, b) => {
                const aUsed = a.status === 'USED' ? 1 : 0;
                const bUsed = b.status === 'USED' ? 1 : 0;
                if (aUsed !== bUsed) return aUsed - bUsed;
                return new Date(b.createdAt) - new Date(a.createdAt);
            });

            list.innerHTML = history.map(b => {
                const isUsed = b.status === 'USED';
                return `
                <div class="booking-card glass rounded-[2.5rem] p-6 border border-white/5 relative overflow-hidden group ${isUsed ? 'status-used' : ''}">
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl ${b.type === 'FLIGHT' ? 'bg-blue-500/10 text-blue-400' : 'bg-amber-500/10 text-amber-400'} flex items-center justify-center border border-white/10">
                                <i data-lucide="${b.type === 'FLIGHT' ? 'plane' : 'hotel'}" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <h3 class="text-[15px] font-black text-white italic tracking-tight leading-none mb-1">${b.item.airline || b.item.name}</h3>
                                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">${new Date(b.createdAt).toLocaleDateString()}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-amber-500 italic">${b.piAmount} π</p>
                            <span class="text-[8px] ${isUsed ? 'bg-zinc-500/20 text-zinc-400 border-zinc-500/30' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20'} border px-2 py-0.5 rounded-full font-black uppercase tracking-tighter">${b.status}</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-3 mt-6 pt-6 border-t border-white/5 border-dashed">
                        <div>
                            <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest mb-1.5">${b.type === 'FLIGHT' ? 'PNR (Amadeus)' : 'Voucher ID'}</p>
                            <p class="font-mono text-[13px] font-black text-white tracking-[0.2em] uppercase">${b.type === 'FLIGHT' ? b.provider.pnr : b.provider.voucherId}</p>
                        </div>
                        <div class="flex justify-end items-center gap-2 col-span-2">
                            ${isUsed ? `
                            <button onclick="location.href='../mango_review.html?id=${b.bookingId}'" class="w-12 h-12 bg-amber-500/10 rounded-2xl hover:bg-amber-500/20 transition-all border border-amber-500/20 flex items-center justify-center">
                                <i data-lucide="star" class="w-6 h-6 text-amber-500"></i>
                            </button>
                            ` : ''}
                            <button onclick="deleteBooking('${b.bookingId}')" class="w-12 h-12 bg-red-500/10 rounded-2xl hover:bg-red-500/20 transition-all border border-red-500/20 flex items-center justify-center">
                                <i data-lucide="trash-2" class="w-6 h-6 text-red-500"></i>
                            </button>
                            <button onclick='showReceipt(${JSON.stringify(b)})' class="w-12 h-12 bg-white/5 rounded-2xl hover:bg-white/10 transition-all border border-white/10 flex items-center justify-center">
                                <i data-lucide="file-text" class="w-6 h-6 text-blue-400"></i>
                            </button>
                            <button onclick="showQR('${b.qrCode}', '${b.type === 'FLIGHT' ? b.provider.pnr : b.provider.voucherId}')" class="w-12 h-12 bg-white/5 rounded-2xl hover:bg-white/10 transition-all border border-white/10 flex items-center justify-center group-hover:border-amber-500/50">
                                <i data-lucide="qr-code" class="w-6 h-6 text-amber-500"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        window.showQR = (url, id) => {
            document.getElementById('modal-qr-img').src = url;
            document.getElementById('qr-identifier').innerText = id;
            document.getElementById('qr-modal').classList.remove('hidden');
        }

        window.closeQRModal = () => document.getElementById('qr-modal').classList.add('hidden');

        window.showReceipt = (b) => {
            document.getElementById('r-type').innerText = b.type;
            document.getElementById('r-name').innerText = b.item.airline || b.item.name;
            document.getElementById('r-id').innerText = b.type === 'FLIGHT' ? b.provider.pnr : b.provider.voucherId;
            document.getElementById('r-date').innerText = new Date(b.createdAt).toLocaleDateString();
            document.getElementById('r-amount').innerText = b.piAmount + " π";
            document.getElementById('r-qr').src = b.qrCode;
            
            document.getElementById('receipt-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        window.closeReceiptModal = () => document.getElementById('receipt-modal').classList.add('hidden');

        window.saveReceiptImage = () => {
            const area = document.getElementById('receipt-capture-area');
            html2canvas(area, { backgroundColor: '#111', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Mango-Receipt-${document.getElementById('r-id').innerText}.png`;
                link.href = canvas.toDataURL();
                link.click();
                alert("영수증이 갤러리에 저장되었습니다! 🥭");
            });
        }

        function cleanupUsedBookings() {
            let history = JSON.parse(localStorage.getItem('mango_booking_history') || '[]');
            const now = new Date();
            const CLEANUP_THRESHOLD_MS = 24 * 60 * 60 * 1000; // 24시간 후 자동 삭제

            const originalLength = history.length;
            const updatedHistory = history.filter(b => {
                if (b.status !== 'USED') return true;
                // USED 상태인 경우 생성일로부터 24시간이 지났으면 삭제 대상
                const createdDate = new Date(b.createdAt);
                return (now - createdDate) < CLEANUP_THRESHOLD_MS;
            });

            if (updatedHistory.length !== originalLength) {
                localStorage.setItem('mango_booking_history', JSON.stringify(updatedHistory));
            }
        }

        window.deleteBooking = (bookingId) => {
            if (confirm("정말로 이 예약 내역을 삭제하시겠습니까? 🥭")) {
                let history = JSON.parse(localStorage.getItem('mango_booking_history') || '[]');
                const updatedHistory = history.filter(b => b.bookingId !== bookingId);
                localStorage.setItem('mango_booking_history', JSON.stringify(updatedHistory));
                
                // 망고 시그니처 사운드 재생
                const audio = new Audio('../assets/sounds/mangomangodaldalhe.mp3');
                audio.play().catch(e => console.warn("Audio play blocked by browser policy:", e));

                renderBookings();
                alert("예약 내역이 성공적으로 삭제되었습니다.");
            }
        }

        window.onload = () => { 
            cleanupUsedBookings();
            renderBookings(); 
            lucide.createIcons(); 
        }
    </script>
</body>
</html>
