<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mango Admin | Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/styles/mango-core.css">
</head>
<body class="max-w-[480px] mx-auto min-h-screen bg-[#050505] text-white flex flex-col items-center justify-center p-6 font-sans">
    
    <div id="verify-card" class="w-full glass p-10 rounded-[3.5rem] border-amber-500/50 text-center relative overflow-hidden hidden">
        <div class="absolute top-0 left-0 w-full h-1.5 mango-gradient"></div>
        
        <div class="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-emerald-500/30">
            <i data-lucide="shield-check" class="w-10 h-10 text-emerald-400"></i>
        </div>

        <h2 class="text-[10px] font-black text-emerald-500 uppercase tracking-[0.5em] mb-2">Verified Authenticity</h2>
        <h1 id="v-title" class="text-2xl font-black italic text-white tracking-tighter mb-10 uppercase">---</h1>

        <div class="space-y-5 text-left bg-white/5 p-6 rounded-3xl border border-white/5 mb-10">
            <div class="flex justify-between">
                <span class="text-[9px] text-zinc-500 font-bold uppercase">Status</span>
                <span class="text-[10px] text-emerald-400 font-black uppercase tracking-widest">● Active Booking</span>
            </div>
            <div class="flex justify-between">
                <span class="text-[9px] text-zinc-500 font-bold uppercase">Booking ID</span>
                <span id="v-id" class="text-xs font-mono font-black text-white">---</span>
            </div>
            <div class="flex justify-between">
                <span class="text-[9px] text-zinc-500 font-bold uppercase">Travel Date</span>
                <span id="v-date" class="text-xs font-black text-white">---</span>
            </div>
            <div class="flex justify-between">
                <span class="text-[9px] text-zinc-500 font-bold uppercase">Passengers</span>
                <span id="v-people" class="text-xs font-black text-white">2 Adults (Default)</span>
            </div>
            <div class="flex justify-between items-center pt-4 border-t border-white/10">
                <span class="text-[9px] text-zinc-500 font-bold uppercase">Total Paid</span>
                <span id="v-amount" class="text-xl font-black text-amber-500 italic font-orbitron">---</span>
            </div>
        </div>

        <button id="use-complete-btn" onclick="markAsUsed()" class="w-full py-5 mango-gradient text-black font-black rounded-2xl text-[10px] uppercase tracking-widest active:scale-95 transition-all mb-4 hidden">사용 완료 처리</button>
        <button onclick="window.close()" class="w-full py-5 bg-white/5 border border-white/10 text-white font-black rounded-2xl text-[10px] uppercase tracking-widest active:scale-95 transition-all">Close Verification</button>
    </div>

    <!-- Error State -->
    <div id="error-card" class="hidden text-center space-y-6">
        <i data-lucide="alert-triangle" class="w-20 h-20 text-red-500 mx-auto"></i>
        <h2 class="text-xl font-black italic uppercase">Invalid Booking</h2>
        <p class="text-zinc-500 text-sm">해당 예약 정보를 찾을 수 없거나 유효하지 않은 QR 코드입니다.</p>
        <button onclick="location.href='index.html'" class="px-10 py-4 mango-gradient text-black font-black rounded-xl text-xs uppercase">Home</button>
    </div>

    <script>
        function verify() {
            const urlParams = new URLSearchParams(window.location.search);
            const lookupId = urlParams.get('id');
            const history = JSON.parse(localStorage.getItem('mango_booking_history') || '[]');
            
            // PNR 또는 Voucher ID로 데이터 검색
            const booking = history.find(b => 
                (b.provider.pnr === lookupId) || (b.provider.voucherId === lookupId)
            );

            if (booking) {
                document.getElementById('v-title').innerText = booking.item.airline || booking.item.name;
                document.getElementById('v-id').innerText = lookupId;
                document.getElementById('v-date').innerText = new Date(booking.createdAt).toLocaleDateString();
                document.getElementById('v-amount').innerText = booking.piAmount + " π";
                
                // 인원 정보는 예약 시점에 따라 동적 표시 (데이터가 없을 경우 기본값)
                if(booking.item.passengers) {
                    document.getElementById('v-people').innerText = booking.item.passengers;
                }

                document.getElementById('verify-card').classList.remove('hidden');
            } else {
                document.getElementById('error-card').classList.remove('hidden');
            }
            lucide.createIcons();
        }

        window.onload = verify;
    </script>
</body>
</html>
