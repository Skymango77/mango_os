<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mango Travel | My Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --portal-width: 450px; }
        body { background-color: #030303; color: white; font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
        .font-orb { font-family: 'Orbitron', sans-serif; }
        .font-raj { font-family: 'Rajdhani', sans-serif; }
        .portal-window { width: var(--portal-width); margin: 0 auto; position: relative; min-height: 100vh; }
        .premium-glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .ticket-divider { position: relative; border-top: 2px dashed rgba(249, 115, 22, 0.3); margin: 20px 0; }
        .ticket-divider::before, .ticket-divider::after { content: ''; position: absolute; top: -10px; width: 20px; height: 20px; background-color: #030303; border-radius: 50%; border: 1px solid rgba(255,255,255,0.05); }
        .ticket-divider::before { left: -30px; border-left: none; }
        .ticket-divider::after { right: -30px; border-right: none; }

        /* 티켓 좌우 홈 파기 효과 */
.ticket-cut {
    position: relative;
}
.ticket-cut::before, .ticket-cut::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 20px;
    height: 20px;
    background: #030303; /* 배경색과 동일하게 */
    border-radius: 50%;
    transform: translateY(-50%);
}
.ticket-cut::before { left: -11px; border-right: 1px solid rgba(255,255,255,0.05); }
.ticket-cut::after { right: -11px; border-left: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="pb-32"> <header class="portal-window p-6 flex justify-between items-center sticky top-0 z-50 bg-[#030303]/80 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center gap-2">
            <button onclick="history.back()" class="p-2 hover:bg-white/5 rounded-full transition-all">
                <i data-lucide="chevron-left" class="w-6 h-6 text-gray-400"></i>
            </button>
            <h1 class="font-orb text-xl font-black tracking-widest text-white">MY <span class="text-orange-500">RECORDS</span></h1>
        </div>
        <button class="w-10 h-10 rounded-full border border-orange-500/50 bg-orange-500/10 flex items-center justify-center text-orange-400">
            <i data-lucide="bell" class="w-5 h-5"></i>
        </button>
    </header>

    <main class="portal-window px-4 mt-6 space-y-8">
        <section class="premium-glass p-6 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-orange-500/10 blur-[50px] rounded-full"></div>
            <div class="flex justify-between items-center relative z-10">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 rounded-full bg-gradient-to-br from-gray-800 to-gray-900 border border-orange-500/50 flex items-center justify-center shadow-[0_0_15px_rgba(249,115,22,0.2)]">
                        <i data-lucide="user" class="w-6 h-6 text-orange-400"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1 font-orb">Verified Traveler</p>
                        <h2 class="text-lg font-bold text-white">SkyMango</h2>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1 font-orb">Pi Balance</p>
                    <div class="flex items-center gap-1 justify-end">
                        <span class="text-xl font-black font-raj text-transparent bg-clip-text bg-gradient-to-r from-[#FFEFB7] via-[#FFD700] to-[#B45309]">128.50</span>
                        <span class="text-orange-500 font-bold text-sm">π</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="mt-8">
    <div class="flex justify-between items-end mb-4 px-2">
        <h3 class="font-orb text-[11px] text-white/50 tracking-[0.3em] uppercase">Active Tickets</h3>
        <span class="text-[10px] text-orange-500 font-bold bg-orange-500/10 px-2 py-1 rounded">1 Upcoming</span>
    </div>

    <div class="premium-glass ticket-cut p-0 overflow-hidden border border-white/10 group shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
        <div class="p-6 flex justify-between items-start border-b border-white/5 border-dashed">
            <div>
                <div class="flex items-center gap-2 text-orange-500 mb-2">
                    <i data-lucide="plane" class="w-4 h-4"></i>
                    <span class="text-[10px] font-black font-orb uppercase tracking-widest">Travel Pass</span>
                </div>
                <h3 class="text-3xl font-black text-white uppercase tracking-tighter font-orb">HAEUNDAE</h3>
                <p class="text-[10px] text-gray-400 font-medium tracking-widest">BUSAN, SOUTH KOREA</p>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-gray-500 font-orb">GATE</p>
                <p class="text-2xl font-black text-orange-500 font-orb leading-none">M-24</p>
            </div>
        </div>
        
        <div class="p-6 flex justify-between items-center bg-white/[0.03]">
            <div class="space-y-1">
                <p class="text-[9px] text-gray-500 uppercase tracking-widest">Price Paid</p>
                <div class="flex items-center gap-1">
                    <span class="text-xl font-black font-raj text-transparent bg-clip-text bg-gradient-to-r from-[#FFEFB7] to-[#B45309]">1.50</span>
                    <span class="text-orange-500 font-bold text-xs font-orb">π</span>
                </div>
            </div>
            <div class="flex gap-1 opacity-20">
                <div class="w-[2px] h-10 bg-white"></div>
                <div class="w-[4px] h-10 bg-white"></div>
                <div class="w-[1px] h-10 bg-white"></div>
                <div class="w-[3px] h-10 bg-white"></div>
            </div>
            <button onclick="openQR()" class="px-5 py-3 bg-gradient-to-br from-orange-400 to-orange-600 text-black font-black rounded-xl text-[10px] transition-all hover:scale-105 active:scale-95 shadow-[0_5px_15px_rgba(249,115,22,0.4)] uppercase tracking-widest font-orb">
                VIEW QR
            </button>
        </div>
    </div>
</section>
    </main>

    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[450px] bg-[#0a0a0a]/90 backdrop-blur-xl border-t border-white/5 px-6 py-4 z-[90] flex justify-between items-center">
        <button onclick="location.href='index.html'" class="flex flex-col items-center gap-1 group">
            <i data-lucide="home" class="w-5 h-5 text-gray-500 group-hover:text-orange-500 transition-colors"></i>
            <span class="text-[8px] font-orb text-gray-500 group-hover:text-orange-500 uppercase">Home</span>
        </button>
        <button class="flex flex-col items-center gap-1 group">
            <i data-lucide="search" class="w-5 h-5 text-gray-500 group-hover:text-orange-500 transition-colors"></i>
            <span class="text-[8px] font-orb text-gray-500 group-hover:text-orange-500 uppercase">Explore</span>
        </button>
        <div class="relative -top-8">
            <button class="w-14 h-14 bg-gradient-to-br from-orange-400 to-orange-600 rounded-2xl rotate-45 shadow-[0_0_20px_rgba(249,115,22,0.4)] flex items-center justify-center border-2 border-white/20 active:scale-90 transition-all">
                <i data-lucide="layers" class="w-7 h-7 text-black -rotate-45"></i>
            </button>
        </div>
        <button class="flex flex-col items-center gap-1 group">
            <i data-lucide="heart" class="w-5 h-5 text-gray-500 group-hover:text-orange-500 transition-colors"></i>
            <span class="text-[8px] font-orb text-gray-500 group-hover:text-orange-500 uppercase">Saved</span>
        </button>
        <button onclick="location.href='mypage.html'" class="flex flex-col items-center gap-1 group">
            <i data-lucide="user" class="w-5 h-5 text-orange-500 transition-colors"></i>
            <span class="text-[8px] font-orb text-orange-500 uppercase">My Page</span>
        </button>
    </nav>

    <div id="qr-modal" class="fixed inset-0 z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-all duration-500">
        <div class="absolute inset-0 bg-white backdrop-blur-md" onclick="closeQR()"></div>
        <div class="relative text-center p-8 transform scale-90 transition-transform duration-500" id="qr-box">
            <p class="text-black font-orb font-black text-xs mb-6 tracking-[0.3em]">SCAN TO CHECK-IN</p>
            <div class="w-64 h-64 bg-white border-4 border-black rounded-3xl p-4 mx-auto shadow-2xl flex items-center justify-center">
                <i data-lucide="qr-code" class="w-48 h-48 text-black"></i>
            </div>
            <button onclick="closeQR()" class="mt-10 px-8 py-3 bg-black text-white font-orb text-[10px] rounded-full tracking-widest uppercase">Close Window</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function openQR() {
            const modal = document.getElementById('qr-modal');
            const box = document.getElementById('qr-box');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.classList.add('opacity-100', 'pointer-events-auto');
            setTimeout(() => { box.classList.remove('scale-90'); box.classList.add('scale-100'); }, 10);
        }

        function closeQR() {
            const modal = document.getElementById('qr-modal');
            const box = document.getElementById('qr-box');
            box.classList.remove('scale-100'); box.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.remove('opacity-100', 'pointer-events-auto');
                modal.classList.add('opacity-0', 'pointer-events-none');
            }, 300);
        }
    </script>
</body>
</html>
