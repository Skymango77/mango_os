<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MANGO CHAT | Luxury Super App</title>
    
    <!-- Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mango: '#f97316',
                        dark: '#050505',
                        deep: '#1a1a1a',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #000;
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        .mango-gradient {
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .app-container {
            max-width: 480px;
            height: 100dvh;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        .custom-scroll::-webkit-scrollbar { width: 0px; display: none; }
        .custom-scroll { scrollbar-width: none; -ms-overflow-style: none; }

        .tab-active {
            color: #f97316;
            border-bottom: 2px solid #f97316;
        }

        .chat-overlay {
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .chat-overlay.open {
            transform: translateX(0);
        }
    </style>
</head>
<body class="bg-black">

    <div class="app-container mango-gradient flex flex-col border-x border-white/5">
        
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-black/60 backdrop-blur-xl border-b border-white/5 px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-[#f97316] font-serif text-2xl font-black italic tracking-tighter">MANGO CHAT</span>
            </div>
            <div class="flex items-center gap-4">
                <i data-lucide="search" class="w-5 h-5 text-white/40 cursor-pointer hover:text-white transition-colors"></i>
                <div class="w-8 h-8 rounded-full border border-[#f97316]/30 p-0.5" onclick="switchTab('profile')">
                    <img id="my-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin" class="w-full h-full rounded-full bg-zinc-800" alt="Avatar">
                </div>
            </div>
        </header>

        <!-- Top Tabs -->
        <div class="bg-black/40 flex">
            <button onclick="switchTab('friends')" id="tab-friends" class="flex-1 py-4 text-xs font-black tracking-widest uppercase tab-active transition-all">Friends</button>
            <button onclick="switchTab('chats')" id="tab-chats" class="flex-1 py-4 text-xs font-black tracking-widest uppercase text-white/40 hover:text-white transition-all">Chats</button>
        </div>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto custom-scroll px-6 py-4">
            <!-- Section: Friends List -->
            <div id="view-friends" class="space-y-6 block">
                <p class="text-[10px] text-white/20 font-bold uppercase tracking-[0.3em]">Online (2)</p>
                <div class="space-y-5">
                    <div class="flex items-center gap-4 cursor-pointer group" onclick="openChat('Sarah')">
                        <div class="relative">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah" class="w-12 h-12 rounded-full bg-deep border border-white/10" alt="Sarah">
                            <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-dark"></span>
                        </div>
                        <div class="flex-1">
                            <h4 class="text-sm font-bold text-white group-hover:text-[#f97316]">Sarah (Busan Node)</h4>
                            <p class="text-[10px] text-white/40">Exploring mPi Real Estate</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 cursor-pointer group" onclick="openChat('Kevin')">
                        <div class="relative">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Kevin" class="w-12 h-12 rounded-full bg-deep border border-white/10" alt="Kevin">
                            <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-dark"></span>
                        </div>
                        <div class="flex-1">
                            <h4 class="text-sm font-bold text-white group-hover:text-[#f97316]">John Doe</h4>
                            <p class="text-[10px] text-white/40">Verified Pioneer</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Section: Chat List -->
            <div id="view-chats" class="space-y-3 hidden">
                <div class="glass-card p-4 rounded-3xl flex items-center gap-4 cursor-pointer hover:bg-white/[0.08] transition-all" onclick="openChat('Global Group')">
                    <div class="relative flex-shrink-0">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mango" class="w-14 h-14 rounded-2xl bg-zinc-800" alt="Group">
                        <span class="absolute -top-1 -right-1 bg-[#f97316] text-[10px] font-black px-1.5 py-0.5 rounded-full text-black">12</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-center mb-1">
                            <h4 class="text-sm font-bold text-white truncate">Mango Global Lounge</h4>
                            <span class="text-[10px] text-white/20">14:20</span>
                        </div>
                        <p class="text-xs text-white/40 truncate italic">"When is the next mPi drop?"</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Connection Handshake Modal -->
        <div id="invite-modal" class="fixed inset-0 z-[300] hidden bg-black/90 backdrop-blur-xl flex items-center justify-center p-6">
            <div class="w-full max-w-[350px] glass-card p-8 rounded-[2.5rem] border-orange-500/30 flex flex-col items-center gap-6 text-center animate-in zoom-in duration-300">
                <div class="w-20 h-20 bg-mango rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(249,115,22,0.4)]">
                    <i data-lucide="handshake" class="w-10 h-10 text-black"></i>
                </div>
                <div class="space-y-1">
                    <h3 class="text-lg font-black text-white italic tracking-tight">CONNECTION REQUEST</h3>
                    <p id="invite-user-id" class="text-xs font-bold text-mango">User_1234</p>
                    <p class="text-[9px] text-white/40 uppercase tracking-[0.2em] pt-2">Wants to chat with you</p>
                </div>
                <div class="flex gap-3 w-full">
                    <button onclick="respondToInvite(false)" class="flex-1 py-4 bg-white/5 border border-white/10 rounded-2xl text-[10px] font-black text-white/40 hover:bg-white/10 transition-all">DECLINE</button>
                    <button onclick="respondToInvite(true)" class="flex-1 py-4 bg-mango text-black font-black rounded-2xl text-[10px] shadow-lg active:scale-95 transition-all">ACCEPT</button>
                </div>
            </div>
        </div>

        <!-- FAB -->
        <button class="fixed bottom-28 right-[calc(50%-210px)] md:right-[calc(50%-210px)] w-14 h-14 bg-[#f97316] rounded-2xl flex items-center justify-center shadow-[0_15px_40px_rgba(249,115,22,0.4)] hover:scale-110 active:scale-95 transition-all z-30">
            <i data-lucide="plus" class="w-8 h-8 text-black"></i>
        </button>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-black/80 backdrop-blur-2xl border-t border-white/5 h-20 flex justify-around items-center px-6 z-50">
            <button class="flex flex-col items-center gap-1 text-white/20 hover:text-[#f97316] transition-colors">
                <i data-lucide="user" class="w-6 h-6"></i>
            </button>
            <button class="flex flex-col items-center gap-1 text-[#f97316] transition-colors">
                <i data-lucide="message-circle" class="w-6 h-6"></i>
            </button>
            <button class="flex flex-col items-center gap-1 text-white/20 hover:text-[#f97316] transition-colors">
                <i data-lucide="shopping-bag" class="w-6 h-6"></i>
            </button>
            <button class="flex flex-col items-center gap-1 text-white/20 hover:text-[#f97316] transition-colors">
                <i data-lucide="settings" class="w-6 h-6"></i>
            </button>
        </nav>

        <!-- Chat Overlay -->
        <div id="chat-overlay" class="chat-overlay fixed inset-0 z-[100] mango-gradient max-w-[480px] mx-auto flex flex-col">
            <header class="bg-black/60 backdrop-blur-xl border-b border-white/5 px-6 py-5 flex items-center gap-4">
                <button onclick="closeChatOverlay()"><i data-lucide="chevron-left" class="w-6 h-6 text-white/60"></i></button>
                <div class="flex-1">
                    <h3 id="overlay-chat-name" class="font-bold text-sm">Sarah</h3>
                    <p class="text-[10px] text-green-500 font-bold uppercase">Online Now</p>
                </div>
                <div id="typing-status" class="text-[10px] text-white/40 italic mr-4 hidden">...is typing</div>
                <i data-lucide="more-horizontal" class="w-5 h-5 text-white/40"></i>
            </header>
            <div class="flex-1 p-6 space-y-4 custom-scroll overflow-y-auto" id="message-container">
            </div>
            <div class="p-6 bg-black/40 backdrop-blur-md border-t border-white/5 flex gap-3">
                <button onclick="toggleGiftModal()" class="w-12 h-12 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center text-white/40 hover:text-mango transition-all">
                    <i data-lucide="plus" class="w-6 h-6"></i>
                </button>
                <div class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-4 py-3 flex items-center gap-3">
                    <i data-lucide="smile" class="w-5 h-5 text-white/20"></i>
                    <input id="chat-input" type="text" placeholder="Mango Secure Message..." class="bg-transparent border-none outline-none text-sm w-full text-white placeholder:text-white/20">
                </div>
                <button id="send-btn" class="w-12 h-12 bg-[#f97316] rounded-2xl flex items-center justify-center text-black shadow-lg">
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        // Socket.io Setup
        const socket = io('http://localhost:5000');
        let currentUser = 'Guest_' + Math.floor(Math.random() * 1000);
        let currentRoom = null;

        // Tab Switching
        function switchTab(name) {
            const friendsView = document.getElementById('view-friends');
            const chatsView = document.getElementById('view-chats');
            const friendsTab = document.getElementById('tab-friends');
            const chatsTab = document.getElementById('tab-chats');

            if (name === 'friends') {
                friendsView.classList.remove('hidden');
                chatsView.classList.add('hidden');
                friendsTab.classList.add('tab-active');
                friendsTab.classList.remove('text-white/40');
                chatsTab.classList.remove('tab-active');
                chatsTab.classList.add('text-white/40');
            } else {
                chatsView.classList.remove('hidden');
                friendsView.classList.add('hidden');
                chatsTab.classList.add('tab-active');
                chatsTab.classList.remove('text-white/40');
                friendsTab.classList.remove('tab-active');
                friendsTab.classList.add('text-white/40');
            }
        }

        // Chat Overlay
        function openChat(name) {
            activePeer = name;
            currentRoom = name === 'Global Group' ? 'global_lounge' : `room_${[currentUser, name].sort().join('_')}`;
            document.getElementById('overlay-chat-name').innerText = name;
            document.getElementById('chat-overlay').classList.add('open');
            
            // Join Socket Room
            socket.emit('join_room', { roomId: currentRoom, username: currentUser });
            
            // Clear local view and mark as read
            document.getElementById('message-container').innerHTML = '';
            socket.emit('mark_as_read', { roomId: currentRoom, username: currentUser });
        }

        function closeChatOverlay() {
            document.getElementById('chat-overlay').classList.remove('open');
            currentRoom = null;
            activePeer = null;
        }

        function toggleGiftModal() {
            document.getElementById('gift-modal').classList.toggle('translate-y-full');
        }

        // UI Message Rendering
        function appendMessage(msg) {
            const container = document.getElementById('message-container');
            const isMe = msg.sender === currentUser;
            const isGift = msg.type === 'gift';
            
            let contentHtml = `<p class="text-sm">${msg.content}</p>`;
            
            if (isGift) {
                contentHtml = `
                    <div class="flex flex-col gap-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-black/20 rounded-xl flex items-center justify-center text-xl">${msg.item.icon}</div>
                            <div>
                                <p class="text-xs font-bold">${msg.item.name} Gift</p>
                                <p class="text-[10px] opacity-60">Confirmed Transaction</p>
                            </div>
                        </div>
                        <button class="w-full py-2 bg-white/10 hover:bg-white/20 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">View Gift</button>
                    </div>
                `;
            }

            const messageHtml = `
                <div class="flex flex-col ${isMe ? 'items-end ml-auto' : 'items-start'} gap-1 ${isGift ? 'w-[260px]' : 'max-w-[80%]'} animate-in fade-in zoom-in duration-300">
                    <div class="${isMe ? 'bg-[#f97316] text-black font-medium shadow-[0_10px_20px_rgba(249,115,22,0.2)]' : 'glass-card text-white'} px-4 py-3 rounded-[1.5rem] ${isMe ? 'rounded-tr-none' : 'rounded-tl-none'} w-full">
                        ${contentHtml}
                    </div>
                    <div class="flex items-center gap-2 px-2">
                        <span class="text-[9px] text-white/20">${msg.timestamp}</span>
                        ${isMe ? `<span class="text-[9px] text-mango font-bold read-status">${msg.readBy.length > 1 ? '' : '1'}</span>` : ''}
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', messageHtml);
            container.scrollTop = container.scrollHeight;
        }

        // Messaging Logic
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        const sendMessage = () => {
            const content = chatInput.value.trim();
            if (content && currentRoom) {
                const msgData = {
                    roomId: currentRoom,
                    sender: currentUser,
                    content: content
                };
                socket.emit('send_message', msgData);
                chatInput.value = '';
                socket.emit('stop_typing', { roomId: currentRoom });
            }
        };

        // Gift Commerce Logic
        async function processGift(name, price, icon) {
            if (!Pi || !activePeer) return;
            toggleGiftModal();

            try {
                const payment = await Pi.createPayment({
                    amount: price,
                    memo: `Mango Gift: ${name} for ${activePeer}`,
                    metadata: { type: "gift", recipient: activePeer, item: name }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        return fetch('http://localhost:5000/api/v1/payments/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': authData.token },
                            body: JSON.stringify({ paymentId })
                        });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        return fetch('http://localhost:5000/api/v1/payments/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': authData.token },
                            body: JSON.stringify({ 
                                paymentId, txid, 
                                roomId: currentRoom, 
                                recipient: activePeer,
                                item: { name, price, icon } 
                            })
                        });
                    },
                    onCancel: (paymentId) => { console.log("Gift cancelled"); },
                    onError: (error, payment) => { console.error("Gift error", error); }
                });
            } catch (err) {
                console.error("Payment trigger failed", err);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Typing Indicators
        let typingTimeout;
        chatInput.addEventListener('input', () => {
            if (!currentRoom) return;
            socket.emit('typing', { roomId: currentRoom, username: currentUser });
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('stop_typing', { roomId: currentRoom });
            }, 2000);
        });

        // Socket Listeners
        socket.on('receive_message', (msg) => {
            if (msg.roomId === currentRoom) {
                appendMessage(msg);
                if (msg.sender !== currentUser) {
                    socket.emit('mark_as_read', { roomId: currentRoom, username: currentUser });
                }
            }
        });

        socket.on('load_history', (history) => {
            history.forEach(msg => appendMessage(msg));
        });

        socket.on('display_typing', (data) => {
            const typingEl = document.getElementById('typing-status');
            if (data.isTyping && data.roomId === currentRoom) {
                typingEl.innerText = `${data.username} is typing...`;
                typingEl.classList.remove('hidden');
            } else {
                typingEl.classList.add('hidden');
            }
        });

        socket.on('read_status_update', () => {
            // Basic logic: Remove "1" when someone else reads
            document.querySelectorAll('.read-status').forEach(el => el.innerText = '');
        });

        socket.on('receive_gift_notification', () => {
            // Notify user in "More" tab (Settings icon)
            const navIcons = document.querySelectorAll('nav button');
            navIcons[3].insertAdjacentHTML('beforeend', '<span class="absolute top-4 right-6 w-2 h-2 bg-mango rounded-full animate-pulse"></span>');
        });

        // Pi Auth Integration
        async function initPi() {
            try {
                await Pi.init({ version: "2.0", sandbox: true });
                const auth = await Pi.authenticate(['username', 'payments'], (payment) => {
                    console.warn("Incomplete payment:", payment);
                });
                console.log("👤 Pi User Authenticated:", auth.user.username);
                currentUser = auth.user.username;

                // Send token to Mango Backend
                const response = await fetch('https://api.mango-os.com/api/v1/auth/pi-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accessToken: auth.accessToken })
                });

                if (response.ok) {
                    authData = await response.json();
                    console.log("✅ Mango System Sync Complete");
                }
            } catch (err) {
                console.error("Pi Auth error:", err);
            }
        }

        window.addEventListener('load', initPi);
    </script>
</body>
</html>
